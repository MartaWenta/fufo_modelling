<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Future Forests C3 — Interactive Modelling Framework</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1e3a5f; --green:#1a7a4a; --blue:#1a4f8a;
  --muted:#94a3b8; --border:#e2e8f0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:#f0f4f8;color:#1e293b;
     min-height:100vh;display:flex;flex-direction:column;}

/* ── Header ── */
header{background:var(--navy);padding:12px 24px 10px;border-bottom:3px solid var(--green);
       flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.h-left .tag{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.2em;
             color:#6bcf9e;text-transform:uppercase;margin-bottom:3px;}
.h-left h1{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.02em;}
.h-left .sub{font-size:10px;color:#94a3b8;margin-top:2px;font-style:italic;}
.h-right{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.leg{display:flex;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:#94a3b8;}
.leg-line{width:20px;height:2px;border-radius:1px;}
.leg-dash{width:20px;height:0;border-top:2px dashed;}

/* ── Toolbar ── */
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:8px 20px;
         display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex-shrink:0;}
.filter-btn{background:#f8fafc;border:1.5px solid var(--border);border-radius:5px;
            padding:4px 12px;font-size:11px;font-family:'IBM Plex Mono',monospace;
            cursor:pointer;transition:all .15s;color:#475569;}
.filter-btn:hover,.filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
#reset-btn{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);color:#c0392b;
           font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px 12px;
           border-radius:5px;cursor:pointer;display:none;}

/* ── Canvas: scrollable ── */
.canvas-wrap{flex:1;overflow:auto;position:relative;min-height:200px;}
#canvas{position:relative;width:1600px;min-height:900px;}

/* ── SVG arrows overlay ── */
#arrows{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;z-index:10;}

/* ── Layer bands ── */
.layer-band{position:absolute;left:0;right:0;z-index:1;}
.layer-label{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;
             letter-spacing:.14em;text-transform:uppercase;padding:4px 14px 3px;}

/* ── Node cards ── */
.node{position:absolute;border-radius:8px;background:#fff;cursor:pointer;
      transition:box-shadow .15s,opacity .2s;overflow:hidden;z-index:20;}
.node:hover{box-shadow:0 4px 20px rgba(0,0,0,.15);}
.node.active{box-shadow:0 6px 24px rgba(0,0,0,.2);}
.node.dimmed{opacity:.15;pointer-events:none;}
.node-head{padding:7px 10px 5px;border-bottom:1px solid #f1f5f9;}
.node-title{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:11px;
            line-height:1.3;margin-bottom:2px;}
.node-sub{font-size:10px;color:#475569;line-height:1.3;}
.node-body{padding:6px 10px;}
.node-detail{font-size:9.5px;color:#94a3b8;line-height:1.5;margin-bottom:2px;}
.node-hire{font-size:9px;margin-top:4px;padding-top:4px;border-top:1px solid #f1f5f9;}
.node-pi{font-size:8.5px;color:#64748b;margin-top:3px;font-style:italic;}

/* ── Wide banner nodes (C1, Dormann) ── */
.node.banner{display:flex;align-items:center;}
.node.banner .node-head{border-bottom:none;border-right:1px solid #f1f5f9;
                         flex-shrink:0;width:320px;padding:8px 14px;}
.node.banner .node-body{flex:1;padding:6px 14px;}

/* ── Info panel ── */
#info-panel{position:fixed;bottom:0;left:0;right:0;background:var(--navy);color:#fff;
            border-top:3px solid var(--green);padding:12px 24px;
            display:none;z-index:100;font-family:'IBM Plex Mono',monospace;}
#info-panel.visible{display:grid;grid-template-columns:1fr auto;}
#info-title{font-weight:700;font-size:13px;color:#6bcf9e;margin-bottom:3px;}
#info-pi{color:#cbd5e1;font-size:10px;margin-bottom:3px;font-family:'IBM Plex Sans',sans-serif;}
#info-desc{color:#94a3b8;font-size:10px;line-height:1.5;font-family:'IBM Plex Sans',sans-serif;max-width:900px;}
#info-connects{color:#64748b;font-size:9px;margin-top:3px;}
#info-hire{color:#fbbf24;font-size:10px;text-align:right;align-self:start;white-space:nowrap;padding-left:20px;}
</style>
</head>
<body>

<header>
  <div class="h-left">
    <div class="tag">Future Forests Excellence Cluster · Universität Freiburg · Research Area C3</div>
    <h1>C3 Integrated Modelling Framework — Interactive Connection Map</h1>
    <div class="sub">Click any node to reveal its connections · Roadmap status March 2026</div>
  </div>
  <div class="h-right">

    <div class="leg"><div class="leg-line" style="background:#d97706;height:3px"></div>Coupling ⇄</div>
    <div class="leg"><div class="leg-dash" style="border-color:#c0392b"></div>Feedback</div>
    <div class="leg"><div class="leg-dash" style="border-color:#7c8a9e"></div>Lateral</div>
      </div>
</header>

<div class="toolbar">
  <span style="font-size:10px;color:#94a3b8;font-family:'IBM Plex Mono',monospace">FILTER:</span>
  <button class="filter-btn active" onclick="filterLayer('all',this)">All</button>
  <button class="filter-btn" onclick="filterLayer('0',this)">C1 / C2</button>
  <button class="filter-btn" onclick="filterLayer('1',this)">Climate &amp; Hydrology</button>
  <button class="filter-btn" onclick="filterLayer('2',this)">Forest Ecology &amp; Structure</button>
  <button class="filter-btn" onclick="filterLayer('3',this)">Socio-Economic</button>
  <button id="reset-btn" onclick="resetAll()">✕ Clear selection</button>
</div>

<div class="canvas-wrap">
  <div id="canvas">
    <svg id="arrows"><defs></defs></svg>
  </div>
</div>

<div id="info-panel">
  <div>
    <div id="info-title"></div>
    <div id="info-pi"></div>
    <div id="info-desc"></div>
    <div id="info-connects"></div>
  </div>
  <div id="info-hire"></div>
</div>

const CONN_STYLES = {
  data:       { stroke:'#1a7a4a', width:2,   dash:'' },
  validation: { stroke:'#5b50c4', width:1.5, dash:'6,3' },
  coupling:   { stroke:'#d97706', width:3,   dash:'' },
  feedback:   { stroke:'#c0392b', width:2,   dash:'7,3' },
  lateral:    { stroke:'#7c8a9e', width:1.2, dash:'4,3' },
  conceptual: { stroke:'#a78bfa', width:1.5, dash:'3,4' },
};

const CONNECTIONS = [
  ['jung','iland','data'],    ['jung','christen','lateral'], ['jung','weiler_gis','lateral'],
  ['jung','orth','lateral'],  ['jung','roger','data'],       ['jung','brown','lateral'],
  ['jung','stahl','lateral'],  ['stahl','orth','lateral'],    ['stahl','christen','lateral'],
  ['stahl','kattenborn','lateral'], ['stahl','brown','lateral'], ['stahl','weiler_gis','lateral'],
  ['stahl','roger','data'],    ['stahl','iland','data'],
  ['christen','iland','data'],    ['christen','roger','data'],
  ['christen','seifert','lateral'],['christen','weiler_gis','lateral'],['christen','orth','lateral'],
  ['weiler_gis','iland','data'], ['weiler_gis','roger','data'], ['weiler_gis','kattenborn','lateral'],
  ['seifert','iland','validation'], ['seifert','kattenborn','lateral'], ['seifert','weiler_gis','lateral'],
  ['kattenborn','iland','validation'], ['kattenborn','orth','lateral'],
  ['kattenborn','hanewinkel','lateral'], ['kattenborn','brown','lateral'],
  ['orth','iland','validation'], ['orth','weiler_gis','lateral'],
  ['iland','roger','coupling'],   ['roger','iland','coupling'],
  ['iland','brown','data'],       ['iland','stritih','data'],
  ['iland','hanewinkel','data'],  ['iland','pauliuk','data'],
  ['pauliuk','hanewinkel','lateral'], ['hanewinkel','pauliuk','lateral'],
  ['schanz','hanewinkel','lateral'],  ['schanz','brown','lateral'],
  ['schanz','iland','lateral'],       ['pauliuk','schanz','lateral'],
  ['pauliuk','brown','lateral'],      ['stritih','brown','data'],
  ['stritih','iland','data'],         ['stritih','pauliuk','data'],
  ['hanewinkel','iland','feedback'],  ['brown','iland','feedback'],
  ['c1','iland','conceptual'],  ['c1','stritih','conceptual'],
  ['c1','brown','conceptual'],  ['c1','hanewinkel','conceptual'],
  ['c1','pauliuk','conceptual'],['c1','schanz','conceptual'],
  ['c2_scenarios','iland','data'],    ['c2_scenarios','roger','data'],
  ['c2_scenarios','brown','data'],    ['c2_scenarios','hanewinkel','data'],
  ['c2_scenarios','stritih','data'],  ['c2_scenarios','pauliuk','data'],
  // Yannek — evaluates and improves C3 models; synergy with Schanz
  ['yannek','iland','lateral'],   ['yannek','roger','lateral'],
  ['yannek','landclim','lateral'],['yannek','schanz','lateral'],
  // LandClim — outputs feed economic and land use models
  ['jung','landclim','data'],     ['weiler_gis','landclim','data'],
  ['landclim','hanewinkel','data'], ['landclim','brown','data'],
  // Christen ML — sensor network feeds it; outputs improve iLAND and RoGeR forcing
  ['christen','christen_ml','data'], ['jung','christen_ml','data'],
  ['orth','christen_ml','lateral'],  ['christen_ml','iland','data'],
  ['christen_ml','roger','data'],
];

// Adjacency
const adj = {};
NODES.forEach(n => adj[n.id] = new Set());
CONNECTIONS.forEach(([a,b]) => { adj[a].add(b); adj[b].add(a); });

// ══════════════════════════════════════════════════════════
// LAYOUT: compute positions
// ══════════════════════════════════════════════════════════
function layerDef(id) { return LAYERS_DEF.find(l => l.id === id); }

// Place nodes within their layer
function layoutNodes() {
  // Layer 0: C1 and C2 side by side
  const c1 = NODES.find(n=>n.id==='c1');
  const c2s = NODES.find(n=>n.id==='c2_scenarios');
  const L0 = layerDef(0);
  const halfW = (CANVAS_W - PAD*2 - GAP) / 2;
  c1._x = PAD;              c1._y = L0.y + 22; c1._w = halfW; c1._h = L0.h - 30;
  c2s._x = PAD + halfW + GAP; c2s._y = L0.y + 22; c2s._w = halfW; c2s._h = L0.h - 30;

  // Layer 1: 7 nodes evenly spaced
  const L1nodes = NODES.filter(n=>n.layer===1);
  const L1 = layerDef(1);
  const totalW1 = L1nodes.length * NW + (L1nodes.length-1)*GAP;
  let x1 = (CANVAS_W - totalW1) / 2;
  L1nodes.forEach(n => {
    n._x = x1; n._y = L1.y + 28; n._w = NW; n._h = L1.h - 36;
    x1 += NW + GAP;
  });

  // Layer 2: iLAND (wide), RoGeR, LandClim
  const L2 = layerDef(2);
  const il = NODES.find(n=>n.id==='iland');
  const ro = NODES.find(n=>n.id==='roger');
  const lc = NODES.find(n=>n.id==='landclim');
  il._w = 520; il._h = L2.h - 36;
  ro._w = 310; ro._h = L2.h - 36;
  lc._w = 260; lc._h = L2.h - 36;
  const total2 = il._w + GAP*3 + ro._w + GAP*3 + lc._w;
  const off2 = (CANVAS_W - total2) / 2;
  il._x = off2;                          il._y = L2.y + 28;
  ro._x = off2 + il._w + GAP*3;         ro._y = L2.y + 28;
  lc._x = ro._x + ro._w + GAP*3;        lc._y = L2.y + 28;

  // Layer 3: 5 nodes evenly spaced
  const L3nodes = NODES.filter(n=>n.layer===3);
  const L3 = layerDef(3);
  const totalW3 = L3nodes.length * NW_L3 + (L3nodes.length-1)*GAP;
  let x3 = (CANVAS_W - totalW3) / 2;
  L3nodes.forEach(n => {
    n._x = x3; n._y = L3.y + 28; n._w = NW_L3; n._h = L3.h - 36;
    x3 += NW_L3 + GAP;
  });
}

// ══════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════
function renderBands() {
  const canvas = document.getElementById('canvas');
  canvas.style.height = CANVAS_H + 'px';
  canvas.style.width  = CANVAS_W + 'px';

  LAYERS_DEF.forEach(L => {
    const band = document.createElement('div');
    band.className = 'layer-band';
    band.style.cssText = `top:${L.y}px;height:${L.h}px;background:${L.fill};`;
    const label = document.createElement('div');
    label.className = 'layer-label';
    label.style.cssText = `color:${L.ink};background:${L.band};`;
    label.textContent = L.label;
    band.appendChild(label);
    canvas.appendChild(band);
  });
}

const nodeEls = {};

function renderNodes() {
  const canvas = document.getElementById('canvas');
  NODES.forEach(n => {
    const div = document.createElement('div');
    div.className = 'node' + (n.banner ? ' banner' : '');
    div.id = 'node-' + n.id;
    div.dataset.id = n.id;
    div.dataset.layer = n.layer;
    div.style.cssText = `
      left:${n._x}px; top:${n._y}px;
      width:${n._w}px; height:${n._h}px;
      border:2px solid ${n.stroke};
    `;

    const hireColor = n.hire.includes('⚠') ? '#c0392b' : (n.hireOk ? '#1a7a4a' : '#94a3b8');

    if (n.banner) {
      div.innerHTML = `
        <div class="node-head" style="background:${n.stroke}18;">
          <div class="node-title" style="color:${n.inkColor};font-size:12px;">${n.title}</div>
          <div class="node-sub">${n.sub}</div>
          <div class="node-pi">${n.pi}</div>
        </div>
        <div class="node-body">
          <div class="node-detail">${n.detail}</div>
          ${n.hire && !n.hire.startsWith('TBD') ? `<div class="node-hire" style="color:${hireColor};">${n.hire}</div>` : ''}
        </div>`;
    } else {
      div.innerHTML = `
        <div class="node-head" style="background:${n.stroke}18;">
          <div class="node-title" style="color:${n.inkColor};">${n.title}</div>
          <div class="node-sub">${n.sub}</div>
        </div>
        <div class="node-body">
          <div class="node-detail">${n.detail}</div>
          ${n.hire && !n.hire.startsWith('TBD') ? `<div class="node-hire" style="color:${hireColor};"><span style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;">Researcher:</span><br>${n.hire}</div>` : ''}
          <div class="node-pi">${n.pi}</div>
        </div>`;
    }

    div.addEventListener('click', () => onNodeClick(n.id));
    canvas.appendChild(div);
    nodeEls[n.id] = div;
  });
}

// ── SVG Arrows ──
const NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs={}) {
  const e = document.createElementNS(NS, tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
  return e;
}

const connEls = {};

function renderArrows() {
  const svg = document.getElementById('arrows');
  svg.setAttribute('width',  CANVAS_W);
  svg.setAttribute('height', CANVAS_H);
  svg.setAttribute('viewBox', `0 0 ${CANVAS_W} ${CANVAS_H}`);

  // Arrowhead markers
  const defs = svg.querySelector('defs');
  Object.entries(CONN_STYLES).forEach(([type, s]) => {
    const m = svgEl('marker', { id:`arr-${type}`, markerWidth:'8', markerHeight:'7',
      refX:'7', refY:'3.5', orient:'auto' });
    const p = svgEl('polygon', { points:'0 0,8 3.5,0 7', fill:s.stroke });
    m.appendChild(p); defs.appendChild(m);
  });

  CONNECTIONS.forEach(([from, to, type]) => {
    const fn = NODES.find(n=>n.id===from);
    const tn = NODES.find(n=>n.id===to);
    if (!fn||!tn) return;

    const s = CONN_STYLES[type];

    // Edge centres
    const fx = fn._x + fn._w/2, fy = fn._y + fn._h/2;
    const tx = tn._x + tn._w/2, ty = tn._y + tn._h/2;

    // Determine entry/exit edges
    let x1=fx, y1=fy, x2=tx, y2=ty;
    const offset = (type==='coupling') ? (from<to ? -8:8) : 0;

    if (fn.layer < tn.layer) {
      y1 = fn._y + fn._h; y2 = tn._y;
    } else if (fn.layer > tn.layer) {
      y1 = fn._y; y2 = tn._y + tn._h;
    } else {
      // same layer — arc above
      y1 = fn._y - 2; y2 = tn._y - 2;
    }

    const mx = (x1+x2)/2 + offset;
    const my = fn.layer===tn.layer
      ? Math.min(fn._y, tn._y) - 35
      : (y1+y2)/2;

    const path = svgEl('path', {
      d:`M ${x1+offset} ${y1} Q ${mx} ${my} ${x2+offset} ${y2}`,
      stroke: s.stroke, 'stroke-width': s.width,
      'stroke-dasharray': s.dash,
      fill:'none', 'stroke-linecap':'round',
      'marker-end':`url(#arr-${type})`,
      class:'conn',
    });
    path.style.cssText = 'opacity:0;transition:opacity .2s;';

    const key = `${from}|||${to}`;
    connEls[key] = path;
    svg.appendChild(path);
  });
}

// ══════════════════════════════════════════════════════════
// INTERACTION
// ══════════════════════════════════════════════════════════
let activeNode = null;

function onNodeClick(id) {
  if (activeNode === id) { resetAll(); return; }
  activeNode = id;
  document.getElementById('reset-btn').style.display = 'block';

  const connected = adj[id];

  NODES.forEach(n => {
    const el = nodeEls[n.id];
    el.classList.remove('active','dimmed');
    if (n.id === id) el.classList.add('active');
    else if (!connected.has(n.id)) el.classList.add('dimmed');
  });

  Object.entries(connEls).forEach(([key, path]) => {
    const [f,t] = key.split('|||');
    path.style.opacity = (f===id||t===id) ? '1' : '0';
  });

  const node = NODES.find(n=>n.id===id);
  const connNames = [...connected].map(cid => {
    const cn = NODES.find(n=>n.id===cid);
    return cn ? cn.title.split('—')[0].trim() : cid;
  }).join('  ·  ');

  document.getElementById('info-title').textContent = node.title;
  document.getElementById('info-pi').textContent = node.pi;
  document.getElementById('info-desc').textContent = node.desc;
  document.getElementById('info-connects').textContent = `Connected to: ${connNames}`;
  const hireEl = document.getElementById('info-hire');
  hireEl.textContent = (node.hire && !node.hire.startsWith('TBD')) ? node.hire : '';
  hireEl.style.display = (node.hire && !node.hire.startsWith('TBD')) ? '' : 'none';
  document.getElementById('info-panel').classList.add('visible');
}

function resetAll() {
  activeNode = null;
  NODES.forEach(n => nodeEls[n.id].classList.remove('active','dimmed'));
  Object.values(connEls).forEach(p => p.style.opacity='0');
  document.getElementById('info-panel').classList.remove('visible');
  document.getElementById('reset-btn').style.display = 'none';
}

function filterLayer(layer, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  NODES.forEach(n => {
    nodeEls[n.id].style.display = (layer==='all'||String(n.layer)===layer) ? '' : 'none';
  });
}

// ── Boot ──
layoutNodes();
renderBands();
renderNodes();
renderArrows();
</script>
</body>
</html>
