  notes: 'C2 PIs: Stahl (hydro-climatic scenarios and extreme events), Schindler, Christen, Orth. Hanewinkel co-leads C2 at cluster-speaker level and contributes socio-economic scenarios, but is not a PI on the C2 project proposal. HyClimScenarios (Jung/Schindler) is the primary C2 computational output feeding C3.'
  area_of_application: Climate and socio-economic scenarios
  topic: Transdisciplinary Regionalised Scenarios
