# ============================================================
# Future Forests C3 — Model Registry
# ============================================================
# Source: FuFo Vollantrag + Workshop presentations 03.03.2026
# Maintained by: Scientific Modelling Coordinator, SES-ModelLab
# Abbreviation key:
#   Ta   = Air temperature
#   VPD  = Vapour Pressure Deficit
#   Prec = Precipitation
#   Rad  = Solar radiation / shortwave radiation
#   SWC  = Soil Water Content
#   LAI  = Leaf Area Index
#   DBH  = Diameter at Breast Height
#   TLS  = Terrestrial Laser Scanning
#   ULS  = UAV (drone) Laser Scanning
#   LiDAR= Light Detection and Ranging
#   ES   = Ecosystem Services
#   ABM  = Agent-Based Model
#   ABE  = Agent-Based Engine (iLAND management module)
#   CMIP6= Coupled Model Intercomparison Project Phase 6
#   SSP  = Shared Socioeconomic Pathway
#   RCP  = Representative Concentration Pathway
#   NFF  = Nature's Futures Framework
#   GFPM = Global Forest Products Model
#   GAMS = General Algebraic Modelling System
#   CLD  = Causal Loop Diagram
#   MFA  = Material Flow Analysis
#   LCA  = Life Cycle Assessment
# ============================================================

groups:

  # ── LAYER 1: OBSERVATIONS & FORCING ──────────────────────

  - id: jung_schindler
    layer: 1
    pi: "Dr. Christopher Jung / Prof. Dr. Dirk Schindler"
    pi_applicants: ["Prof. Dr. Kerstin Stahl", "Prof. Dr. Dirk Schindler", "Prof. Dr. Andreas Christen", "Prof. Dr. René Orth"]
    model_name: "HyClimScenarios"
    short_description: "Preparation of regionalized reanalysis and future climate scenario data to support all cluster activities. Develops novel approaches for forest-relevant aspects of the water balance and climate, including extreme events. Part of C2."
    type: "Statistical downscaling / Climate scenario modelling"
    key_question: "What are the relevant hydro-climatic conditions and extreme events that future forests in our study region will face, historically and under future warming scenarios?"
    modelling_approach: "Statistical downscaling / Machine learning (tree-ensemble)"
    language: ["Python", "R"]
    status: "in_development"
    scale: "100 m x 100 m grid, regional to SW Germany"
    inputs:
      - name: "ERA5-Land gridded reanalysis (0.10 x 0.10 degrees, hourly)"
        format: "NetCDF"
        source: "ECMWF (open access)"
      - name: "Global Historical Climatology Network — >2000 measurement sites in Central Europe"
        format: "CSV"
        source: "NOAA GHCN (open access)"
      - name: "CMIP6 global climate model outputs under various SSP/RCP scenarios"
        format: "NetCDF"
        source: "ESGF (open access)"
      - name: "Digital elevation model predictors"
        format: "GeoTIFF"
        source: "National surveys"
      - name: "Land use model predictors (verify source)"
        format: "GeoTIFF / CSV"
        source: "Copernicus / national surveys (to be confirmed)"
    outputs:
      - name: "Downscaled hourly/daily fields at 100 m x 100 m: air temperature (Ta), precipitation (Prec), dew point, wind speed, solar radiation (Rad), vapour pressure deficit (VPD), derived climate indices"
        format: "NetCDF / CSV"
        resolution: "100 m x 100 m"
        consumers: ["christen", "iland", "roger", "stritih"]
      - name: "Climate projections under CMIP6 global warming levels (1.5C, 2C, 3C+)"
        format: "NetCDF"
        consumers: ["iland", "roger", "brown"]
    method: "Tree-ensemble methods for residual-based bias correction of hourly reanalysis and daily climate model products. Statistical downscaling from ~10-120 km to 100 m x 100 m."
    hire:
      name: "TBD"
      start: "TBD"

  - id: stahl
    layer: 1
    pi: "Prof. Dr. Kerstin Stahl"
    pi_collaborators: ["Prof. Dr. Dirk Schindler", "Prof. Dr. Markus Weiler"]
    model_name: "Extreme Event Storylines & Coupled Groundwater Hydrology"
    short_description: "C2 co-lead (with Hanewinkel). Stahl's role is fundamentally different from Jung's continuous climate projections: she specialises in what happens at the extremes. She develops event storylines and stress-tests of the 'what-if' type — for example, what if the catastrophic drought sequence of 2018–2022, which was severely damaging to forests, were to recur in 2050 when forest SESs may have partially adapted? She also leads coupled surface-groundwater hydrological modelling, extending RoGeR with the groundwater model MODFLOW (Hellwig et al. 2021) to assess how groundwater disconnection from forest root systems intensifies drought stress. Stahl and Weiler have a long joint track record applying hydrological models from small headwater catchments to all of Germany, including the DRIeR collaborative project on drought and StressRes on stakeholder scenario co-design."
    type: "Extreme value analysis / Event storyline modelling / Coupled hydrology"
    key_question: "What would happen to forests if a catastrophic drought sequence like 2018–2022 were to recur in 2050 — and how deep does the damage reach into the groundwater system?"
    modelling_approach: "Extreme event storylines / Coupled surface-groundwater modelling"
    language: ["R", "Python"]
    status: "in_development"
    scale: "Regional — FuFo domain to state-wide (SW Germany and all of Germany)"
    inputs:
      - name: "Downscaled climate projections (historical and future scenarios)"
        format: "NetCDF"
        source: "jung_schindler / ECMWF / ESGF"
      - name: "Long-term hydrological observation records (streamflow, groundwater levels)"
        format: "CSV"
        source: "German water authorities / GRDC"
      - name: "RoGeR model outputs — soil water and lateral flow"
        format: "NetCDF / CSV"
        source: "weiler (roger)"
    outputs:
      - name: "Extreme event storylines and stress-test scenarios (e.g. recurrence of 2018–22 drought in 2050)"
        format: "NetCDF / structured scenario parameters"
        consumers: ["iland", "roger", "brown", "christen", "kattenborn", "orth"]
      - name: "Coupled surface-groundwater model outputs — groundwater levels under drought stress"
        format: "NetCDF / CSV"
        consumers: ["iland", "roger", "weiler_gis"]
      - name: "Hydro-climatic indices: drought frequency, severity, duration"
        format: "CSV / NetCDF"
        consumers: ["brown", "hanewinkel"]
    hire:
      name: "TBD"
      start: "TBD"
    notes: "C2 co-lead with Hanewinkel. Connected to 6 groups per workshop matrix — one of the most connected nodes. Previous joint projects with Weiler: DRIeR (drought), StressRes (scenario co-design). FRIAS focus theme on Environmental Modelling with Dormann and Baumgärtner."

  - id: christen
    layer: 1
    pi: "Prof. Dr. Andreas Christen"
    pi_collaborators: ["Prof. Dr. Friederike Lang", "Prof. Dr. Markus Weiler", "Dr. Florian Schnabel"]
    project: "Theme A1 — Data-driven prediction of effective hydro-climatic and biogeochemical forest conditions"
    model_name: "In-canopy Microclimate ML Model & Biogeochemical Monitoring (AMSES)"
    short_description: "Theme A1 investigates how climatic changes amplify or moderate within-forest microclimatic conditions, what drives this propagation, and how within-forest hydro-meteorological conditions affect soil carbon dynamics and water cycles. It is built around approximately 300 observational forest plots and 40–50 research catchments. Christen and Lang co-lead. The modelling component follows a three-step approach: (1) quality control and adaptive sensor network design using station uniqueness rankings; (2) ML hindcasting of in-canopy microclimates over 30 years at each sensor network site; (3) a transferable regional model integrating geospatial predictors, sensor data and physical downscaling to predict below-canopy temperatures and humidity at any forested location in the FuFo domain. In parallel, Lang leads the biogeochemical dimension: impacts of forest microclimate on soil carbon dynamics (C-model) and on the water cycle and clean water provisioning (WP4), using the 40–50 research catchments."
    type: "Machine learning / Spatial-temporal downscaling / Biogeochemical monitoring"
    key_question: "What are the exact temperature, humidity, and soil conditions inside forests — and how do they control soil carbon storage and water quality?"
    modelling_approach: "Machine learning / Spatial-temporal downscaling"
    language: ["Python"]
    status: "in_development"
    scale: "100 m x 100 m grid; 300 sensor plots, 150 forest stands, 40-50 research catchments"
    inputs:
      - name: "ERA5-Land reanalysis / HyClimScenarios output (Jung)"
        format: "NetCDF"
        source: "jung_schindler / ECMWF"
      - name: "Sensor network time series — air temperature (Ta) and humidity from ~300 field plots across 150 stands"
        format: "CSV / HDF5"
        source: "FuFo field sensor network (A1)"
      - name: "Geospatial predictors: forest structure (canopy height, LAI), orography (slope, aspect, elevation), soils"
        format: "GeoTIFF / LAS"
        source: "weiler_gis / seifert"
      - name: "Physical downscaling climate fields"
        format: "NetCDF"
        source: "jung_schindler"
      - name: "Soil samples and lysimeter data for soil carbon and nutrient flux analysis (Lang/WP3)"
        format: "CSV / laboratory data"
        source: "A1 field campaigns"
      - name: "Hydrological observations across 40-50 research catchments (Lang/WP4)"
        format: "CSV"
        source: "A1 field campaigns / German water authorities"
    outputs:
      - name: "100 m x 100 m gridded in-canopy microclimate: air temperature (Ta), soil temperature, near-surface temperature; 30-year hindcast and climate extreme statistics"
        format: "NetCDF / GeoTIFF"
        consumers: ["iland", "roger", "stritih"]
      - name: "Soil carbon dynamics model for study regions (C-model, Lang/WP3)"
        format: "CSV / model output"
        consumers: ["iland", "pauliuk"]
      - name: "Water cycle and clean water provisioning assessments across catchments (Lang/WP4)"
        format: "CSV / reports"
        consumers: ["roger", "weiler_gis"]
    method: "Step 1: station uniqueness via step-wise removal procedure (Plein, Dormann & Christen 2025, arXiv:2511.11652). Step 2: tree-ensemble ML for hindcasting and gap-filling. Step 3: unified spatio-temporal model combining ML, physical downscaling, geospatial predictors."
    hire:
      name: "Tabea Wörner (PhD)"
      start: "2026-04-01"
    notes: "Theme A1 co-lead: Christen + Friederike Lang. Contributors: Kammerer, Orth, Puhlmann, Seifert, Stahl, Weiler. The biogeochemical and water cycle dimensions (Lang) are as important as the microclimate ML work (Christen)."

  - id: weiler_gis
    layer: 1
    pi: "Prof. Dr. Markus Weiler"
    model_name: "Spatial Data Infrastructure & Ecohydrological Framework (GIS)"
    short_description: "Weiler's role in C3 spans two nodes: this GIS infrastructure layer and the RoGeR hydrological model (Layer 2). Here, his group provides the static spatial data backbone for all C3 models: soil properties, forest structure, hydrology network, and catchment delineations at 100 m resolution across the FuFo domain. The data draws on national soil maps (BÜK200), forest inventory (BWI), and LiDAR terrain models from LGL Baden-Württemberg. Beyond data provision, Weiler brings broad ecohydrological expertise — from stand-level water balance to state-wide hydrological modelling — developed across multiple joint projects: DRIeR (drought, with Stahl and Bauhus), WaldlabOR (decentralised water retention in the Black Forest), and a coupling of RoGeR with bark beetle infestation risk at 10 m resolution (with Puhlmann). He also contributes to Theme A1 (water cycle and clean water provisioning, WP4, with Lang and Christen)."
    type: "GIS / Spatial data integration / Ecohydrology"
    key_question: "What does the physical landscape look like — where are the soils, forests, and water networks — and how do forests interact with the water cycle from stand to watershed?"
    modelling_approach: "GIS / Spatial data integration"
    language: ["Python", "R", "QGIS"]
    status: "operational"
    scale: "FuFo domain, 100 m resolution; ecohydrological work: stand to watershed (1m–1000s km²)"
    inputs:
      - name: "National soil maps (BÜK200) — soil texture, depth, hydraulic properties"
        format: "GeoTIFF / Shapefile"
        source: "BGR Federal Institute for Geosciences (open)"
      - name: "Forest inventory data (Bundeswaldinventur BWI)"
        format: "Shapefile / CSV"
        source: "ForstBW / BMEL (restricted)"
      - name: "LiDAR terrain and canopy height models"
        format: "LAS / GeoTIFF"
        source: "LGL Baden-Württemberg"
    outputs:
      - name: "Soil properties and depth grids (texture, field capacity, wilting point)"
        format: "GeoTIFF"
        consumers: ["iland", "roger"]
      - name: "Forest structure layers (canopy height, species composition, stand age)"
        format: "GeoTIFF / Shapefile"
        consumers: ["iland", "seifert", "christen"]
      - name: "Hydrology network and catchment delineations"
        format: "Shapefile"
        consumers: ["roger"]
      - name: "Tree species distribution maps"
        format: "GeoTIFF"
        consumers: ["iland"]
    hire:
      name: "TBD"
      start: "TBD"

  - id: seifert
    layer: 1
    pi: "Prof. Dr. Thomas Seifert"
    pi_collaborators: ["Dr. Axel Albrecht", "Prof. Dr. Marc Hanewinkel", "Prof. Dr. Markus Weiler"]
    model_name: "LiDAR Forest Inventory and Dendroecology"
    short_description: "Provides iLAND initialisation data from terrestrial (TLS) and UAV (ULS) laser scanning — individual tree positions, diameter at breast height (DBH), height, and species — combined with dendrochronology (tree ring) growth records. Also contributes to digital twins of forest stands."
    type: "Remote sensing / Field measurements / Dendroecology"
