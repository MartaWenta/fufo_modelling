  model_name: CRAFTY-EU — European Land Use Agent-Based Model
  short_description: CRAFTY-EU is an agent-based model operating at EU27+3 scale and 1 km resolution, embedded within the LandSyMM global framework that couples land use decision-making with macroeconomics,
    trade, ecosystem processes, biodiversity, and the climate system. Within FuFo, it provides the continental-scale context for the C3 models, upscaling local management patterns and ecosystem service
    outcomes and linking them to global scenarios (SSPs, RCPs, NFF). A key open challenge is bridging the scale difference between CRAFTY-EU (1 km) and iLAND (100 m).
  type: Agent-based model (ABM) / Land use model
  modelling_approach: Agent-based model / Land use model
  language:
