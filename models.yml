    model_name: "C1 — SES Conceptual Framework"
    short_description: "The theoretical and conceptual backbone of the entire Future Forests cluster. C1 develops a shared interdisciplinary social-ecological systems (SES) framework — including consistent definitions, indicators, accounting frameworks, and system boundaries — that all other research areas build on. It bridges natural science and social science vocabularies so that biophysical models and social models can be meaningfully connected."
    key_question: "What is a future forest as a social-ecological system — how do we define it, measure it, and talk about it across disciplines?"
    modelling_approach: "Conceptual / Theoretical SES framework (not a computational model)"
