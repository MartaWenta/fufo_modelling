  - name: Qualitative and quantitative baseline management and decision-making data
    source: RA B (B1-B3)
  - name: SSP/RCP/NFF scenario parameters
    source: C2 / IPCC / IPBES
  outputs:
  - name: Land-use scenarios and management activities at European scale (EU27+3, 1 km resolution)
  - name: Transformation and Adaptation Pathways under behavioural, socioeconomic, political and climatic change
  hire:
