# ============================================================
# Future Forests C3 — Model Registry
# ============================================================
# Source: FuFo Vollantrag + Workshop presentations 03.03.2026
# Maintained by: Scientific Modelling Coordinator, SES-ModelLab
# Abbreviation key:
#   Ta   = Air temperature
#   VPD  = Vapour Pressure Deficit
#   Prec = Precipitation
#   Rad  = Solar radiation / shortwave radiation
#   SWC  = Soil Water Content
#   LAI  = Leaf Area Index
#   DBH  = Diameter at Breast Height
#   TLS  = Terrestrial Laser Scanning
#   ULS  = UAV (drone) Laser Scanning
#   LiDAR= Light Detection and Ranging
#   ES   = Ecosystem Services
#   ABM  = Agent-Based Model
#   ABE  = Agent-Based Engine (iLAND management module)
#   CMIP6= Coupled Model Intercomparison Project Phase 6
#   SSP  = Shared Socioeconomic Pathway
#   RCP  = Representative Concentration Pathway
#   NFF  = Nature's Futures Framework
#   GFPM = Global Forest Products Model
#   GAMS = General Algebraic Modelling System
#   CLD  = Causal Loop Diagram
#   MFA  = Material Flow Analysis
#   LCA  = Life Cycle Assessment
# ============================================================

groups:

  # ── LAYER 1: OBSERVATIONS & FORCING ──────────────────────

  - id: jung_schindler
    layer: 1
    pi: "Dr. Christopher Jung / Prof. Dr. Dirk Schindler"
    pi_applicants: ["Prof. Dr. Kerstin Stahl", "Prof. Dr. Dirk Schindler", "Prof. Dr. Andreas Christen", "Prof. Dr. René Orth"]
    model_name: "HyClimScenarios"
    short_description: "Preparation of regionalized reanalysis and future climate scenario data to support all cluster activities. Develops novel approaches for forest-relevant aspects of the water balance and climate, including extreme events. Part of C2."
    type: "Statistical downscaling / Climate scenario modelling"
    language: ["Python", "R"]
    status: "in_development"
    scale: "100 m x 100 m grid, regional to SW Germany"
    inputs:
      - name: "ERA5-Land gridded reanalysis (0.10 x 0.10 degrees, hourly)"
        format: "NetCDF"
        source: "ECMWF (open access)"
      - name: "Global Historical Climatology Network — >2000 measurement sites in Central Europe"
        format: "CSV"
        source: "NOAA GHCN (open access)"
      - name: "CMIP6 global climate model outputs under various SSP/RCP scenarios"
        format: "NetCDF"
        source: "ESGF (open access)"
      - name: "Digital elevation model predictors"
        format: "GeoTIFF"
        source: "National surveys"
      - name: "Land use model predictors"
        format: "GeoTIFF / CSV"
        source: "Copernicus / national surveys"
    outputs:
      - name: "Downscaled hourly/daily fields at 100 m x 100 m: air temperature (Ta), precipitation (Prec), dew point, wind speed, solar radiation (Rad), vapour pressure deficit (VPD), derived climate indices"
        format: "NetCDF / CSV"
        resolution: "100 m x 100 m"
        consumers: ["christen", "iland", "roger", "stritih"]
      - name: "Climate simulations under CMIP6 global warming levels (1.5C, 2C, 3C+)"
        format: "NetCDF"
        consumers: ["iland", "roger", "brown"]
    method: "Tree-ensemble methods for residual-based bias correction of hourly reanalysis and daily climate model products. Statistical downscaling from ~10-120 km to 100 m x 100 m."
    hire:
      name: "TBD"
      start: "TBD"
    notes: "Leads HyClimScenarios (C2). Primary climate forcing for the entire C3 framework. Applicants: Stahl, Schindler, Christen, Orth."

  - id: stahl
    layer: 1
    pi: "Prof. Dr. Kerstin Stahl"
    pi_collaborators: ["Prof. Dr. Dirk Schindler"]
    model_name: "Hydro-climatic Modelling and Extreme Events"
    short_description: "Provides downscaled reanalysis data and downscaled climate model outputs with a focus on extreme value statistics and hydro-climatic research. Supplies hydrological and meteorological forcing for multiple C3 groups and connects the climate and hydrology modelling streams."
    type: "Data analysis / Statistical modelling / Extreme value analysis"
    language: ["R", "Python"]
    status: "in_development"
    scale: "Regional — FuFo domain and SW Germany"
    inputs:
      - name: "Downscaled reanalysis products"
        format: "NetCDF"
        source: "jung_schindler / ECMWF"
      - name: "Downscaled climate model outputs (CMIP6)"
        format: "NetCDF"
        source: "jung_schindler / ESGF"
    outputs:
      - name: "Extreme value statistics and hydro-climatic indices (drought, flood frequency)"
        format: "NetCDF / CSV"
        consumers: ["brown", "christen", "jung_schindler", "kattenborn", "orth", "weiler_gis"]
      - name: "Hydrologically relevant climate scenario products"
        format: "NetCDF / CSV"
        consumers: ["weiler_gis", "roger"]
    hire:
      name: "TBD"
      start: "TBD"
    notes: "Connected to 6 groups per workshop matrix. Bridges climate and hydrology modelling streams. Works closely with Jung/Schindler on HyClimScenarios."

  - id: christen
    layer: 1
    pi: "Prof. Dr. Andreas Christen"
    pi_collaborators: ["Prof. Dr. Markus Weiler", "Dr. Florian Schnabel"]
    project: "A1 WP1 — Adaptive Sensor Network"
    model_name: "In-canopy Microclimate ML Model (AMSES)"
    short_description: "Three-step approach: (1) quality control and adaptive network design using station uniqueness rankings; (2) ML hindcasting of in-canopy microclimates over 30 years; (3) transferable regional model integrating geospatial predictors, sensor data and physical downscaling to predict below-canopy temperatures at any forested location in the FuFo domain."
    type: "Machine learning / Spatial-temporal downscaling"
    language: ["Python"]
    status: "in_development"
    scale: "100 m x 100 m, 300 sensor plots across 150 stands"
    inputs:
      - name: "ERA5-Land reanalysis / HyClimScenarios output (Jung)"
        format: "NetCDF"
        source: "jung / ECMWF"
      - name: "Sensor network time series — air temperature (Ta) and humidity from 300 field plots"
        format: "CSV / HDF5"
        source: "FuFo field sensor network"
      - name: "Geospatial predictors: forest structure, orography (slope, aspect, elevation), soils"
        format: "GeoTIFF / LAS"
        source: "weiler_gis / seifert"
      - name: "Physical downscaling (PDS) climate fields"
        format: "NetCDF"
        source: "jung_schindler"
    outputs:
      - name: "100 m x 100 m gridded microclimate: in-canopy air temperature (Ta), soil temperature, near-surface temperature; 30-year hindcast; statistics and frequency of climate extremes"
        format: "NetCDF / GeoTIFF"
        resolution: "100 m x 100 m"
        consumers: ["iland", "roger", "stritih"]
    method: "Step 1: station uniqueness via step-wise removal procedure (Plein, Dormann & Christen 2025, arXiv:2511.11652). Step 2: tree-ensemble ML for hindcasting and gap-filling. Step 3: unified spatio-temporal model combining ML, physical downscaling, geospatial predictors."
    hire:
      name: "Tabea Worner (PhD)"
      start: "2026-04-01"
    notes: "Works closely with HyClimScenarios (Jung/C2) for future scenario forcing. Model output is the primary fine-scale climate driver for iLAND."

  - id: weiler_gis
    layer: 1
    pi: "Prof. Dr. Markus Weiler"
    model_name: "Spatial Data Layers (GIS)"
    short_description: "Provides the static spatial data infrastructure for the entire C3 framework: soil properties, forest structure, hydrology network, and tree species distributions at 100 m resolution."
    type: "GIS / Remote sensing data integration"
    language: ["Python", "R", "QGIS"]
    status: "operational"
    scale: "FuFo domain, 100 m resolution"
    inputs:
      - name: "National soil maps (BUeK200) — soil texture, depth, hydraulic properties"
        format: "GeoTIFF / Shapefile"
        source: "BGR Federal Institute for Geosciences (open)"
      - name: "Forest inventory data (Bundeswaldinventur BWI)"
        format: "Shapefile / CSV"
        source: "ForstBW / BMEL (restricted)"
      - name: "LiDAR terrain and canopy height models"
        format: "LAS / GeoTIFF"
        source: "LGL Baden-Wuerttemberg"
    outputs:
      - name: "Soil properties and depth grids (texture, field capacity, wilting point)"
        format: "GeoTIFF"
        consumers: ["iland", "roger"]
      - name: "Forest structure layers (canopy height, species composition, stand age)"
        format: "GeoTIFF / Shapefile"
        consumers: ["iland", "seifert", "christen"]
      - name: "Hydrology network and catchment delineations"
        format: "Shapefile"
        consumers: ["roger"]
      - name: "Tree species distribution maps"
        format: "GeoTIFF"
        consumers: ["iland"]
    hire:
      name: "TBD"
      start: "TBD"

  - id: seifert
    layer: 1
    pi: "Prof. Dr. Thomas Seifert"
    pi_collaborators: ["Dr. Axel Albrecht", "Prof. Dr. Marc Hanewinkel", "Prof. Dr. Markus Weiler"]
    model_name: "LiDAR Forest Inventory and Dendroecology"
    short_description: "Provides iLAND initialisation data from terrestrial (TLS) and UAV (ULS) laser scanning — individual tree positions, diameter at breast height (DBH), height, and species — combined with dendrochronology (tree ring) growth records. Also contributes to digital twins of forest stands."
    type: "Remote sensing / Field measurements / Dendroecology"
    language: ["R", "Python", "C++"]
    status: "in_development"
    scale: "Individual tree to stand (up to ~10 000 ha catchment)"
    inputs:
      - name: "TLS/ULS 3D point clouds — individual tree 3D structure"
        format: "LAS / LAZ"
        source: "Field campaigns"
      - name: "Tree core samples for dendrochronology (tree ring width, density)"
        format: "CSV / raw scans"
        source: "Field campaigns"
      - name: "Forest structure layers"
        format: "GeoTIFF"
        source: "weiler_gis"
    outputs:
      - name: "iLAND initialisation files: tree positions, DBH (diameter at breast height), height, species, age"
        format: "CSV / SQLite"
        consumers: ["iland"]
      - name: "Dendrochronology growth records (annual ring width, climate response)"
        format: "CSV"
        consumers: ["iland", "orth"]
      - name: "Digital twin 3D forest stand models"
        format: "LAS / mesh"
        consumers: ["iland", "christen"]
    hire:
      name: "TBD"
      start: "2026-07-01 (pending)"
    notes: "Hiring ongoing. Scale: individual tree to ~10 000 ha. Collaborators: Albrecht, Hanewinkel, Weiler."

  - id: kattenborn
    layer: 1
    pi: "Prof. Dr. Teja Kattenborn"
    pi_collaborators: ["Prof. Dr. René Orth", "Dr. Pia Müller"]
    model_name: "Remote Sensing Mortality and Plant Traits"
    short_description: "Drone and satellite-based mapping of tree mortality using convolutional neural networks (CNN). Contributes to the deadtree.earth initiative. Derives RS-based plant functional traits (leaf area index LAI, chlorophyll, crown area) for iLAND validation and calibration."
    type: "Deep learning / Remote sensing"
    language: ["Python"]
    status: "operational"
    scale: "Drone: stand scale; Satellite: landscape to regional"
    inputs:
      - name: "Drone RGB and multispectral imagery"
        format: "GeoTIFF"
        source: "Field campaigns / deadtree.earth initiative"
      - name: "Sentinel-2 and Landsat time series (multispectral, 10-30 m resolution)"
        format: "NetCDF / GeoTIFF"
        source: "ESA Copernicus / USGS (open access)"
    outputs:
      - name: "Tree mortality maps (probability and spatial extent)"
        format: "GeoTIFF"
        consumers: ["iland"]
      - name: "RS-derived plant traits: leaf area index (LAI), chlorophyll, crown area"
        format: "GeoTIFF / CSV"
        consumers: ["iland", "orth"]
    hire:
      name: "TBD"
      start: "TBD"

  - id: orth
    layer: 1
    pi: "Prof. Dr. René Orth"
    pi_collaborators: ["Prof. Dr. Teja Kattenborn", "Dr. Pia Müller"]
    model_name: "Forest Drought Response Functions"
    short_description: "Quantifies the emergent response of forests to dryness using global satellite and flux tower data. Generates species-specific response functions relating vegetation function to soil water content (SWC) and vapour pressure deficit (VPD) — used to constrain drought mortality in iLAND. Ref: Lusk et al. 2025 (bioRxiv)."
    type: "Machine learning / Data synthesis / Observational"
    language: ["Python", "R"]
    status: "operational"
    scale: "Global training data applied regionally in FuFo domain"
    inputs:
      - name: "Global plant trait maps (TRY database — leaf traits, hydraulics)"
        format: "CSV / NetCDF"
        source: "TRY Plant Trait Database (open)"
      - name: "Satellite-derived vapour pressure deficit (VPD) and soil water content (SWC) time series"
        format: "NetCDF"
        source: "ESA CCI / GLEAM (open)"
      - name: "ICOS and AmeriFlux eddy covariance flux tower data (carbon and water fluxes)"
        format: "CSV / NetCDF"
        source: "ICOS RI / AmeriFlux (open)"
      - name: "Dendrochronology growth records"
        format: "CSV"
        source: "seifert / ITRDB (open)"
    outputs:
      - name: "Species-specific drought response functions f(SWC, VPD) -> vegetation function"
        format: "Python/R functions / CSV lookup tables"
        consumers: ["iland"]
      - name: "Benchmark drought mortality and stress datasets for validation"
        format: "CSV / NetCDF"
        consumers: ["iland", "kattenborn"]
    hire:
      name: "TBD"
      start: "TBD"

  # ── LAYER 2: BIOPHYSICAL ENGINE ───────────────────────────

  - id: iland
    layer: 2
    pi: "Prof. Dr. Thomas Seifert"
    pi_collaborators: ["Dr. Axel Albrecht", "Prof. Dr. Marc Hanewinkel", "Prof. Dr. Markus Weiler", "Jun.-Prof. Dr. Ana Stritih"]
    model_name: "iLAND — Individual-based Forest Landscape and Disturbance Model"
    short_description: "Central biophysical engine of C3. Distance-dependent, individual tree-based forest growth simulator based on ecophysiological processes. Open-source, widely applied. Simulates forest dynamics from individual tree to small catchment including disturbances (wind, bark beetle, fire), regeneration, and silvicultural treatments. Includes ABE (Agent-Based Engine) module for management — direct interface to Stritih participatory modelling. Ref: Rammer et al. (2024), Ecol. Modelling 495, 110785."
    type: "Process-based / Individual-based forest landscape model"
    language: ["C++", "R", "JavaScript (iLAND interface)"]
    status: "operational"
    scale: "Individual tree to ~10 000 ha; 100 m x 100 m resolution"
    inputs:
      - name: "Tree initialisation: positions, DBH (diameter at breast height), height, species, age"
        format: "CSV / SQLite"
        source: "seifert (TLS/ULS)"
      - name: "Daily climate forcing: air temperature (Ta), precipitation (Prec), vapour pressure deficit (VPD), solar radiation (Rad)"
        format: "NetCDF / CSV"
        source: "jung_schindler, christen"
      - name: "Soil properties: texture, depth, field capacity, wilting point"
        format: "GeoTIFF / CSV"
        source: "weiler_gis"
      - name: "Soil water content (SWC) and lateral flow — bidirectional coupling"
        format: "Binary / CSV"
        source: "roger"
      - name: "Drought response functions f(SWC, VPD)"
        format: "CSV / R functions"
        source: "orth"
      - name: "Tree mortality maps — for validation and calibration"
        format: "GeoTIFF"
        source: "kattenborn"
      - name: "Management scenarios via ABE (Agent-Based Engine) module"
        format: "JavaScript / structured parameters"
        source: "stritih"
    outputs:
      - name: "Timber volume, carbon stocks, ecosystem services (ES) — annual time series"
        format: "CSV / SQLite"
        consumers: ["hanewinkel", "pauliuk", "brown", "stritih"]
      - name: "Canopy structure, leaf area index (LAI), root water uptake"
        format: "NetCDF / CSV"
        consumers: ["roger"]
      - name: "Forest state maps: species composition, age structure, disturbance history"
        format: "GeoTIFF"
        consumers: ["stritih", "brown", "kattenborn"]
      - name: "Individual tree-level outputs: growth, mortality, regeneration"
        format: "CSV / SQLite"
        consumers: ["seifert", "hanewinkel"]
    hire:
      name: "TBD"
      start: "TBD"
    notes: "Bidirectionally coupled with RoGeR. iLAND -> RoGeR: canopy, LAI, root uptake. RoGeR -> iLAND: soil water content (SWC), lateral flow. ABE module = direct interface to Stritih participatory ABM."

  - id: roger
    layer: 2
    pi: "Prof. Dr. Markus Weiler"
    model_name: "RoGeR — Runoff Generation Research Model"
    short_description: "Process-based hydrological model of water redistribution at the surface and subsurface, mediating local transpiration and trees vulnerability to drought. Three topographic contexts: plateau (1D, no lateral flow), hillslope (lateral subsurface in- and outflow), and riparian/valley (groundwater and capillary rise). Explicitly represents lateral subsurface flow and groundwater exchange — key processes missing from most dynamic vegetation models."
    type: "Process-based hydrological model"
    language: ["Python", "Fortran"]
    status: "operational"
    scale: "Plot to small catchment; 100 m resolution"
    inputs:
      - name: "Climate forcing: precipitation (Prec), potential evapotranspiration (PET)"
        format: "NetCDF / CSV"
        source: "jung_schindler, christen"
      - name: "Soil properties: texture, depth, hydraulic conductivity"
        format: "GeoTIFF / CSV"
        source: "weiler_gis"
      - name: "Topography: slope, aspect, catchment delineation"
        format: "GeoTIFF"
        source: "weiler_gis"
      - name: "Canopy structure, leaf area index (LAI), root water uptake — bidirectional coupling"
        format: "NetCDF / CSV"
        source: "iland"
    outputs:
      - name: "Soil water content (SWC) in root zone, lateral subsurface flow"
        format: "NetCDF / CSV"
        consumers: ["iland"]
      - name: "Streamflow and catchment water balance"
        format: "CSV"
        consumers: ["brown", "hanewinkel"]
      - name: "Groundwater and capillary rise fluxes"
        format: "CSV / NetCDF"
        consumers: ["iland"]
    hire:
      name: "TBD"
      start: "TBD"
    notes: "Bidirectionally coupled with iLAND. Three topographic contexts modelled: plateau (1D), hillslope, riparian/valley. Key: lateral subsurface flow explains tree-to-tree drought mortality differences."

  # ── LAYER 3: SOCIAL & ECONOMIC ────────────────────────────

  - id: stritih
    layer: 3
    pi: "Jun.-Prof. Dr. Ana Stritih"
    model_name: "Participatory Modelling — iLAND + ABE"
    short_description: "Integrates diverse actors perspectives on forest management objectives, decision-making, and key future challenges into iLAND's ABE (Agent-Based Engine) module. Conducts participatory process with local stakeholders (forest managers) to define management scenarios and evaluate their credibility and legitimacy. Produces landscape-scale scenario outputs feeding other C3 models."
    type: "Participatory modelling / Agent-based modelling / Spatial analysis"
    language: ["R", "Python", "JavaScript (iLAND ABE)"]
    status: "in_development"
    scale: "Landscape scale — potential areas: Schwarzwald, Oberrhein (TBD with SES-CaseLab)"
    inputs:
      - name: "Forest state maps: species composition, age structure, disturbance history"
        format: "GeoTIFF"
        source: "iland"
      - name: "Daily climate: min temperature (Tmin), max temperature (Tmax), precipitation (Prec), vapour pressure deficit (VPD), solar radiation (Rad)"
        format: "NetCDF / CSV"
        source: "jung_schindler, christen"
      - name: "Spatial data: soil properties, digital elevation model"
        format: "GeoTIFF"
        source: "weiler_gis"
      - name: "Vegetation initialisation (spin-up or LiDAR-based)"
        format: "CSV"
        source: "seifert"
      - name: "Disturbance distributions: wind speed, bark beetle probability"
        format: "CSV / parameters"
        source: "iland / field data"
      - name: "Stakeholder workshops and interviews (qualitative data)"
        format: "Qualitative"
        source: "SES-CaseLab"
      - name: "Scenario assumptions (SSP/NFF frameworks — source currently underdetermined)"
        format: "Structured parameters"
        source: "C2 / stakeholder co-creation (to be defined)"
    outputs:
      - name: "Management scenarios: silvicultural treatment rules for ABE module"
        format: "JavaScript / structured parameters"
        consumers: ["iland", "hanewinkel", "brown"]
      - name: "Landscape-scale scenario outputs: forest composition and ecosystem service (ES) trajectories"
        format: "GeoTIFF / CSV"
        consumers: ["hanewinkel", "brown"]
      - name: "Stakeholder preference and legitimacy assessments"
        format: "Qualitative / CSV"
        consumers: ["brown", "C4"]
    hire:
      name: "Christina Dollinger (PostDoc, Margarete-von-Wrangell funding, currently TUM)"
      start: "2026-05-01"
    notes: "Participatory process: Agents (forest managers) Observe -> Plan -> Act cycle. Scenario assumptions source underdetermined — should derive from stakeholder co-creation or SSP/NFF frameworks."

  - id: hanewinkel
    layer: 3
    pi: "Prof. Dr. Marc Hanewinkel"
    pi_collaborators: ["Prof. Dr. Stefan Pauliuk"]
    model_name: "Forest Economics and Risk Model (GFPM-SW)"
    short_description: "Economic modelling and evaluation framework for ecosystem services (ES) under risk and uncertainty. Adapts the Global Forest Products Model (GFPM, Buongiorno et al.) for Southwest Germany using partial equilibrium modelling in GAMS (General Algebraic Modelling System). Applies robust management strategies optimised with VaR (Value at Risk) and CVaR (Conditional Value at Risk) metrics. Links biophysical outputs to the industry sphere via Pauliuk wood cascade model."
    type: "Partial equilibrium model / Economic optimisation"
    language: ["R", "Python", "GAMS"]
    status: "planned"
    scale: "Larger regions SW Germany to national scale"
    inputs:
      - name: "Timber volume, carbon stocks, ecosystem services (ES) from iLAND"
        format: "CSV"
        source: "iland"
      - name: "Streamflow and catchment water balance"
        format: "CSV"
        source: "roger"
      - name: "Market structure and governance dynamics"
        format: "CSV / parameters"
        source: "schanz"
      - name: "Socio-economic scenarios and economic panel market data"
        format: "CSV / structured parameters"
        source: "C2 / Eurostat / FAO"
      - name: "Management scenarios"
        format: "Structured parameters"
        source: "stritih"
    outputs:
      - name: "Optimised robust management strategies under uncertainty (VaR/CVaR)"
        format: "CSV / structured parameters"
        consumers: ["iland"]
      - name: "Carbon balance of forest management pathways"
        format: "CSV"
        consumers: ["pauliuk"]
      - name: "Market demand signals (timber, pulp, energy wood)"
        format: "CSV"
        consumers: ["pauliuk"]
      - name: "Preliminary Adaptation and Transformation Pathways (A&TPs) for forests in SW Germany"
        format: "Report / CSV"
        consumers: ["brown", "C4"]
    hire:
      name: "TBD (deadline extended)"
      start: "TBD"
    notes: "Hiring pending — deadline extended. Model: GFPM in GAMS. Risk metrics: VaR/CVaR."

  - id: pauliuk
    layer: 3
    pi: "Prof. Dr. Stefan Pauliuk"
    pi_collaborators: ["Dr. Simon Schulte"]
    model_name: "Wood Cascade and Carbon Accounting (A&TPs)"
    short_description: "Material flow analysis (MFA) and life cycle assessment (LCA) of wood products from harvest through cascading use to end-of-life. Evaluates carbon balance impact of different wood use pathways (material substitution, energy use, long-lived products) over up to 200-year time horizons. Develops Adaptation and Transformation Pathways (A&TPs) for the wood cascade in cooperation with stakeholders via SES-CaseLab."
    type: "Material flow analysis (MFA) / Life cycle assessment (LCA) / Socio-technical systems modelling"
    language: ["Python"]
    status: "in_development"
    scale: "Stand-level to entire wood supply potential; 100 to 200 year horizon"
    inputs:
      - name: "Harvest volumes (annual, by species and assortment)"
        format: "CSV"
        source: "iland"
      - name: "Carbon balance of forest management pathways"
        format: "CSV"
        source: "hanewinkel"
      - name: "Market demand signals"
        format: "CSV"
        source: "hanewinkel"
      - name: "Stakeholder-driven objectives and principles"
        format: "Qualitative / structured parameters"
        source: "SES-CaseLab / stritih"
    outputs:
      - name: "Wood product carbon stocks and flows — material substitution and avoided GHG emissions"
        format: "CSV / Excel"
        consumers: ["hanewinkel", "brown"]
      - name: "A&TPs for wood use and cascading: scenario toolbox"
        format: "Report / structured parameters"
        consumers: ["brown", "C4"]
      - name: "System trajectories under what-if scenarios"
        format: "CSV"
        consumers: ["brown"]
    hire:
      name: "Dr. Simon Schulte"
      start: "TBD"
    notes: "Co-creation process needed — input from RA B and SES-CaseLab required. A&TP = sequence of decisions by agents plus resulting trajectory of system variables."

  - id: schanz
    layer: 3
    pi: "Prof. Dr. Heiner Schanz"
    model_name: "FESMarkets — Forest Ecosystem Service Markets"
    short_description: "Analyses the structural architecture of Forest Ecosystem Service (FES) networks across all forest ES, with focus on water, recreation, and protection. Macro-level: system dynamics model (stocks and flows as function of forest condition/quality). Micro-level: actor perspectives via Causal Loop Diagrams (CLDs). Provides governance dynamics for regulatory simulations. Refs: Schanz et al. (2019) Env. Innovation and Societal Transitions; Mager and Schanz (2026, in prep.)."
    type: "System dynamics / Network of Markets (NoM) / Causal Loop Diagrams (CLD)"
    language: ["Python", "Vensim"]
    status: "planned"
    scale: "Forestry industries — Germany and comparative European contexts"
    inputs:
      - name: "Forest ecosystem services (ES) indicators: timber, water, recreation, protection"
        format: "CSV"
        source: "iland, roger"
      - name: "Policy and governance parameters"
        format: "Structured parameters / qualitative"
        source: "brown, stritih, C4"
      - name: "Market data: prices, volumes, subsidies"
        format: "CSV"
        source: "Eurostat / national statistics"
    outputs:
      - name: "Market structure dynamics (network of markets for forest ES)"
        format: "CSV / time series"
        consumers: ["hanewinkel"]
      - name: "Governance dynamics for regulatory simulations"
