  # ── CROSS-CUTTING: METHODOLOGY & UNCERTAINTY ─────────────

  - id: dormann
    layer: 99
    cross_cutting: true
    pi: "Prof. Dr. Carsten Dormann"
    model_name: "Model-Data Integration & Uncertainty Quantification"
    short_description: "Cross-cutting methodological role spanning C1 and C3. Dormann provides rigorous statistical methods for integrating observational data with models, quantifying and propagating uncertainty through the modelling chain, and developing species distribution and biodiversity models. His work ensures that the outputs of C3 models are scientifically defensible — that we know not just what the models predict, but how confident we should be. In C3, he contributes to calibration, validation, and uncertainty analysis across the model framework."
    key_question: "How uncertain are our model predictions, which uncertainties matter most, and how do we make models and data work together rigorously?"
    modelling_approach: "Statistical modelling / Bayesian inference / Uncertainty quantification"
    type: "Cross-cutting methodology (C1 + C3)"
    language: ["R", "Python"]
    status: "in_development"
    scale: "Cross-cutting — applies to all C3 model outputs"
    inputs:
      - name: "Model outputs from all C3 groups (for uncertainty analysis)"
        format: "CSV / NetCDF"
        source: "All C3 groups"
      - name: "Observational data for model-data integration"
        format: "CSV / databases"
        source: "RA A field campaigns, remote sensing"
      - name: "Evidence base for ecosystem services (for B1)"
        format: "Literature / data"
        source: "Scientific literature / field data"
    outputs:
      - name: "Uncertainty envelopes and sensitivity analyses for C3 model chain"
        format: "R/Python functions / reports"
        consumers: ["iland", "roger", "orth", "stritih", "hanewinkel"]
      - name: "Statistical species distribution and biodiversity models"
        format: "R functions / GeoTIFF"
        consumers: ["iland", "kattenborn", "brown"]
      - name: "Model calibration and validation frameworks"
        format: "R/Python code / documentation"
        consumers: ["All C3 groups"]
      - name: "Evidence syntheses for decision support (B1)"
        format: "Reports"
        consumers: ["c1_framework", "C4"]
    hire:
