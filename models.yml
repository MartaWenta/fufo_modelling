  short_description: 'This group compiles and harmonises the static spatial datasets that underpin all C3 models at 100 m resolution: soil properties from the BÜK200 maps, forest structure from the Bundeswaldinventur
    and LiDAR terrain models, and catchment delineations for hydrological routing.'
