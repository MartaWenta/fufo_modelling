  - R
  - QGIS
  status: operational
  scale: 'FuFo domain, 100 m resolution; ecohydrological work: stand to watershed (1m–1000s km²)'
  inputs:
  - name: 'GIS data: forest structure, soil, hydrology, tree species'
    source: National surveys and databases
  outputs:
  - name: 'Harmonised spatial datasets at 100 m resolution: forest structure, soil properties, hydrology network, tree species'
  hire:
    name: TBD
    start: TBD
  area_of_application: Forestry, hydrology, ecosystem services
  topic: Hydrology, general hydro-modelling
  methods: GIS analysis, hydrological modelling
  cluster: climate_hydrology
- id: seifert
  layer: 1
  pi: Prof. Dr. Thomas Seifert
  pi_collaborators:
  - Dr. Axel Albrecht
  - Prof. Dr. Marc Hanewinkel
  - Prof. Dr. Markus Weiler
  model_name: LiDAR Forest Inventory and Dendroecology
  short_description: This group provides the structural forest data needed to initialise iLAND and validate its simulations. Terrestrial (TLS) and UAV-based (ULS) laser scanning characterise individual
    tree positions, dimensions, and species across the study stands. Dendrochronological records add decades of annual growth response, giving iLAND both a realistic starting state and a long-term observational
    reference for calibration. The group also develops digital twin reconstructions of forest stands for structural analysis.
  type: Remote sensing / Field measurements / Dendroecology
  modelling_approach: Remote sensing (LiDAR) / Dendroecology
  language:
  - R
  - Python
  - C++
  status: in_development
  scale: Individual tree to stand (up to ~10 000 ha catchment)
  inputs:
  - name: LiDAR scans (TLS/ULS)
    source: Field campaigns
  outputs:
  - name: 'Forest structure data for iLAND initialisation: tree positions, dimensions, species'
  hire:
    name: TBD
    start: 2026-07-01 (pending)
  notes: 'Hiring ongoing. Scale: individual tree to ~10 000 ha. Collaborators: Albrecht, Hanewinkel, Weiler.'
  area_of_application: Forest structure assessment
  topic: LiDAR scans and forest structure
  methods: LiDAR measurements, modelling
  cluster: forest_ecology
- id: kattenborn
