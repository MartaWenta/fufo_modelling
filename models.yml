- id: yannek
  layer: 1
  pi: Jun.-Prof. Dr. Yannek Käber
  pi_collaborators:
  - Prof. Dr. Carsten Dormann
  - Prof. Dr. Michael Pregernig
  model_name: Forest Model Evaluation & Improvement (B1)
  short_description: Evaluates C3 forest growth models against the current state of scientific evidence using a structured Level-of-Evidence scheme — a method that grades the credibility of published studies
    in the same way as evidence-based medicine. For each decision relevant to forest management, the project catalogues which processes the available models actually represent — such as drought response, tree
    mortality, regeneration, CO2-limitations, and nitrogen limitations — and reviews the scientific literature to assess whether that representation is adequate. Models found to fall short are improved in
    their open-source code, with iLAND and QUINCY currently the most likely candidates. The decision context is determined together with Research Area B; evidence on biological processes comes from RA A.
    Part of Research Area B1 (evidentiary bases of decision-making).
  type: Model evaluation / Evidence synthesis / Open-source model improvement
  modelling_approach: Evidence-based model evaluation / Meta-modelling
  language:
  - R
  - Python
  status: in_development
  scale: Model evaluation applies across all C3 model scales
  inputs:
  - name: Process documentation and code from C3 forest models
    source: iLAND, RoGeR, LandClim
  - name: Scientific literature on forest processes (drought response, mortality, carbon allocation)
    source: RA A and published literature
  - name: Decision context information — what processes matter for which management questions
    source: RA B (B1-B3)
  outputs:
  - name: Evaluation reports — which models represent which processes adequately, and where gaps exist
  - name: Improved process representations in open-source C3 models
    consumers:
    - iLAND
    - RoGeR
    - LandClim
  hire:
    name: TBD
    start: TBD
  area_of_application: Forest sciences, model evaluation
  topic: Forest model evaluation and improvement
  methods: Evidence synthesis, model review
  cluster: forest_ecology
- id: landclim
  layer: 2
  pi: Dr. Axel Albrecht
  pi_collaborators:
  - Jun.-Prof. Dr. Michaela Haug
  model_name: LandClim — Landscape-Scale Dynamic Vegetation Model
  short_description: LandClim simulates how forest species composition, tree density, and total biomass change over time across large landscape areas — typically thousands of hectares — under different climate
    and management conditions. Unlike iLAND, which tracks every individual tree, LandClim works at a coarser spatial grain but covers larger areas and longer time horizons, making it well-suited to regional
    projections of which tree species will thrive under future conditions. A key feature is that the model can be run with different normative assumptions — for example, comparing a scenario where only native
    European species are allowed against one that includes non-native species like Douglas fir. These normative inputs are developed in collaboration with social anthropologist Michaela Haug and the B3 group
    working on contested tree species, directly connecting ecological modelling with social values.
  type: Dynamic vegetation model (DVM) / Landscape-scale forest simulation
  modelling_approach: Process-based dynamic vegetation model
  language:
  - C++
  - R
  status: in_development
  scale: Landscape to regional scale — thousands of hectares; multi-decadal to centennial time horizon
  inputs:
  - name: Climate projections — temperature, precipitation, extreme events
    source: C2 / Jung/Schindler (HyClimScenarios)
  - name: Soil and terrain data
    source: Weiler (GIS)
  - name: Normative management assumptions — which species are considered acceptable
    source: B3 (Haug, contested tree species) / stakeholder co-creation
  outputs:
  - name: Forest composition projections — tree species, density, and biomass under different management and climate scenarios
    consumers:
    - Hanewinkel (economic valuation of future forest conditions)
    - Brown (CRAFTY-EU, landscape-scale context for land use modelling)
  - name: Species-specific biomass potential maps for the FuFo study region
  hire:
    name: TBD
    start: TBD
  notes: Represents a distinct modelling philosophy from iLAND — phyto-demographic and landscape-scale rather than individual-tree. Haug's social anthropology expertise connects LandClim directly to normative
    and value-driven dimensions of forest futures. Connected to B3 contested tree species work.
  area_of_application: Forest sciences, landscape ecology
  topic: Dynamic vegetation modelling
  methods: Modelling
  cluster: forest_ecology
- id: christen_ml
  layer: 1
  pi: Prof. Dr. Andreas Christen
  pi_collaborators:
  - Prof. Dr. René Orth
  model_name: ML Forest Climate Projections — A1 Integration (from 2028)
  short_description: This project extends the sensor network work (A1 WP1) by adding information about forest biology — specifically how forests breathe and grow — to improve predictions of the climate inside
    forest canopies. The key insight is that the microclimate a tree experiences is not just a function of local weather, but also of how the canopy itself regulates temperature and humidity through leaf area,
    stomatal opening, and photosynthesis. By combining sensor network data from Christen's A1 WP1 work, climate projections from C2, and leaf and canopy physiology data from the QUINCY model (Orth),
    this project can project what temperatures and humidity future forests will experience — not just what the atmosphere above them will look like. This matters for understanding whether forests can buffer
    themselves against climate extremes. The project starts in 2028, building on both the sensor network measurements and the C2 climate projections.
  type: Machine learning / Process-informed spatial downscaling
  modelling_approach: Machine learning / Hybrid physical-statistical downscaling
  language:
  - Python
  status: planned
  scale: FuFo domain — all forested sites; 100 m resolution
  inputs:
  - name: In-canopy microclimate measurements and 30-year hindcast
    source: Christen (A1 WP1 sensor network)
  - name: Downscaled regional climate projections
    source: Jung/Schindler (C2 HyClimScenarios)
  - name: Forest phenology and physiology data — leaf area index, stomatal conductance
    source: Orth (QUINCY model) / satellite observations
  outputs:
  - name: Projected in-canopy microclimates across the FuFo domain — historical to future
    consumers:
    - iLAND (improved climate forcing inside the canopy)
    - RoGeR (canopy interception and transpiration parameters)
  - name: Quantification of forest microclimate buffering — how much does the canopy shield trees from extreme heat and drought?
  hire:
    name: TBD
    start: '2028'
  notes: 'Starts 2028. Dependent on: (1) sensor network measurements and ML hindcast from Christen A1 WP1; (2) C2 climate projections from Jung/Schindler. QUINCY model provides physiology data. Directly
    complements Orth drought response functions group.'
  area_of_application: Meteorology, forest ecology
  topic: In-canopy microclimate modelling
  methods: Machine learning, process-based modelling
  cluster: climate_hydrology
