groups:
- id: jung_schindler
  layer: 1
  pi: Dr. Christopher Jung / Prof. Dr. Dirk Schindler
  pi_applicants:
  - Prof. Dr. Kerstin Stahl
  - Prof. Dr. Dirk Schindler
  - Prof. Dr. Andreas Christen
  - Prof. Dr. René Orth
  model_name: HyClimScenarios
  short_description: This project produces the high-resolution climate forcing that C3 models require, downscaling ERA5-Land reanalysis and CMIP6 projections from the ~10–120 km scale to a 100 m × 100 m
    grid across the study regions. Tree-ensemble machine learning is used for bias correction and statistical downscaling, covering historical conditions and future warming levels. Beyond standard climate
    variables, the project develops novel approaches for forest-relevant aspects of the water balance, including extreme events and event-storyline scenarios developed in collaboration with Stahl.
  type: Statistical downscaling / Climate scenario modelling
  modelling_approach: Statistical downscaling / Machine learning (tree-ensemble)
  language:
  - Python
  - R
  status: in_development
  scale: 100 m x 100 m grid, regional to SW Germany
  inputs:
  - name: ERA5-Land gridded reanalysis (0.10° × 0.10°, hourly)
    source: ECMWF (open access)
  - name: Global Historical Climatology Network — >2000 measurement sites in Central Europe
    source: NOAA GHCN (open access)
  - name: CMIP6 global climate model outputs under various SSP/RCP scenarios
    source: ESGF (open access)
  - name: Digital elevation model predictors
    source: National surveys
  - name: Land use model predictors
    source: Copernicus / national surveys
  outputs:
  - name: 'Downscaled hourly/daily fields at 100 m × 100 m: air temperature, precipitation, dew point, wind speed, solar radiation, vapour pressure deficit, derived climate indices'
  - name: Climate projections under CMIP6 global warming levels (1.5°C, 2°C, 3°C+)
  method: Tree-ensemble methods for residual-based bias correction of hourly reanalysis and daily climate model products. Statistical downscaling from ~10-120 km to 100 m x 100 m.
  hire:
    name: TBD
    start: TBD
  area_of_application: Meteorology, climatology
  topic: Climate analysis and modelling
  methods: Modelling
  cluster: climate_hydrology
- id: stahl
  layer: 1
  pi: Prof. Dr. Kerstin Stahl
  pi_collaborators:
  - Prof. Dr. Dirk Schindler
  - Prof. Dr. Markus Weiler
  model_name: Extreme Event Storylines & Coupled Groundwater Hydrology
  short_description: Stahl's contribution to C3 focuses on two connected areas. First, the development of extreme event storylines and stress-test scenarios — asking, for example, what would happen to forest
    SESs if the 2018–2022 drought sequence recurred under mid-century climate conditions. These scenarios go beyond standard ensemble projections to represent specific, high-impact events relevant for forest
    management. Second, the coupled surface-groundwater hydrological modelling, extending RoGeR with the groundwater model MODFLOW to assess how groundwater disconnection from forest root systems intensifies
    drought stress. Stahl co-leads C2 with Hanewinkel and is connected to six C3 groups in the workshop collaboration matrix.
  modelling_approach: Extreme event storylines / Coupled surface-groundwater modelling
  type: Extreme value analysis / Event storyline modelling / Coupled hydrology
  language:
  - R
  - Python
  status: in_development
  scale: Regional — FuFo domain to state-wide (SW Germany)
  inputs:
  - name: Downscaled reanalysis and climate model outputs
    source: Jung/Schindler (HyClimScenarios)
  - name: Extreme value statistics
  outputs:
  - name: Extreme event storylines and stress-test scenarios
  - name: Coupled surface-groundwater model outputs (RoGeR–MODFLOW coupling)
  hire:
    name: TBD
    start: TBD
  area_of_application: Hydro-climatic research
  topic: Hydro-modelling, extreme events
  methods: Data analysis, modelling
  cluster: climate_hydrology
- id: christen
  layer: 1
  pi: Prof. Dr. Andreas Christen
  pi_collaborators:
  - Prof. Dr. Markus Weiler
  - Dr. Florian Schnabel
  project: Theme A1 WP1 — Adaptive Sensor Network
  model_name: Adaptive Sensor Network & In-canopy Microclimate Model (A1)
  short_description: 'Within-forest microclimates differ substantially from above-canopy conditions and are rarely modelled at scale. This project combines an adaptive sensor network with machine learning
    to reconstruct and predict fine-scale hydro-climatic conditions across the study regions. The network covers approximately 300 plots within 100–150 stands and is self-optimising — sites providing redundant
    information are progressively replaced. From this base, three modelling steps follow: quality-controlled station data are used to hindcast in-canopy conditions over 30 years, and the resulting model
    is extended into a transferable regional tool predicting below-canopy temperatures and humidity at any forested site in the domain.'
  type: Machine learning / Spatial-temporal downscaling
  modelling_approach: Machine learning / Spatial-temporal downscaling
  language:
  - Python
  status: in_development
  scale: 100 m x 100 m grid; 300 sensor plots across 100-150 forest stands
  inputs:
  - name: Sensor network data — in-canopy air temperature and humidity from ~300 field plots
    source: FuFo adaptive sensor network (A1)
  - name: Geospatial predictors and downscaled climate data
    source: Jung/Schindler (HyClimScenarios)
  outputs:
  - name: In-canopy climate statistics and frequency of climate extremes — 30-year hindcast
  - name: Transferable regional model predicting below-canopy temperatures and humidity across the FuFo domain
  hire:
    name: Tabea Wörner (PhD)
    start: '2026-04-01'
  area_of_application: Meteorology, climatology
  topic: Sensor network, forest measurements
  methods: In-situ measurements, modelling
  cluster: climate_hydrology
