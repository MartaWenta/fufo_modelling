    notes: "Co-creation process needed — input from RA B and SES-CaseLab required. A&TP = sequence of decisions by agents plus resulting trajectory of system variables."

  - id: schanz
    layer: 3
    pi: "Prof. Dr. Heiner Schanz"
    model_name: "FESMarkets — Forest Ecosystem Service Markets"
    short_description: "Analyses the structural architecture of Forest Ecosystem Service networks — covering water, recreation, protection, and timber — with a focus on how actual supply and demand for these services occurs through real markets (commodities, contracts) and political markets (subsidies), linked across complex value chain networks. The goal is twofold: to characterise the architecture of these networks, and to explore their governance dynamics as a basis for regulatory simulations and system dynamics modelling. A system dynamics model captures stocks and flows at the macro level; Causal Loop Diagrams represent actor perspectives and governance interventions at the micro level."
    type: "System dynamics / Network of Markets (NoM) / Causal Loop Diagrams (CLD)"
    modelling_approach: "System dynamics / Network of Markets"
    language: ["Python", "Vensim"]
    status: "planned"
    scale: "Forestry industries — Germany and comparative European contexts"
    inputs:
      - name: "Forest ecosystem services (ES) indicators: timber, water, recreation, protection"
        format: "CSV"
        source: "iLAND, RoGeR"
      - name: "Policy and governance parameters"
        format: "Structured parameters / qualitative"
        source: "Brown, Stritih, C4"
      - name: "Market data: prices, volumes, subsidies"
        format: "CSV"
        source: "Eurostat / national statistics"
    outputs:
      - name: "Market structure dynamics (network of markets for forest ES)"
        format: "CSV / time series"
        consumers: ["Hanewinkel"]
      - name: "Governance dynamics for regulatory simulations"
        format: "CSV / structured parameters"
        consumers: ["Brown"]
      - name: "Causal Loop Diagrams (CLDs) for relevant markets and governance interventions"
        format: "Diagram / structured parameters"
        consumers: ["Hanewinkel", "C4"]
    hire:
      name: "Steffi Peuckert (PhD)"
      start: "2026-04-01"
    notes: "Strong synergy with Yannek (group affiliation TBC) on system dynamics — collaboration planned once PhD begins."

  - id: brown
    layer: 3
    pi: "Dr. Calum Brown"
    pi_collaborators: ["Jun.-Prof. Dr. Ana Stritih", "Prof. Dr. Maja Schlüter", "Prof. Dr. Marc Hanewinkel", "Prof. Dr. Stefan Pauliuk"]
    model_name: "CRAFTY-EU — European Land Use Agent-Based Model"
    short_description: "CRAFTY-EU is an agent-based model operating at EU27+3 scale and 1 km resolution, embedded within the LandSyMM global framework that couples land use decision-making with macroeconomics, trade, ecosystem processes, biodiversity, and the climate system. Within FuFo, it provides the continental-scale context for the C3 models, upscaling local management patterns and ecosystem service outcomes and linking them to global scenarios (SSPs, RCPs, NFF). A key open challenge is bridging the scale difference between CRAFTY-EU (1 km) and iLAND (100 m)."
    type: "Agent-based model (ABM) / Land use model"
    modelling_approach: "Agent-based model / Land use model"
    language: ["Python", "Java"]
    status: "planned"
    scale: "EU27+3, 1 km resolution (global context via LandSyMM)"
    inputs:
      - name: "Forest state and ecosystem services (ES)"
        format: "GeoTIFF / CSV"
        source: "iLAND"
      - name: "Management scenarios and stakeholder preferences"
        format: "Structured parameters"
        source: "Stritih"
      - name: "Governance dynamics"
        format: "CSV"
        source: "Schanz"
      - name: "Wood product carbon flows and A&TPs"
        format: "CSV"
        source: "Pauliuk"
      - name: "SSP/RCP/NFF scenario parameters (Shared Socioeconomic Pathways, Representative Concentration Pathways, Nature's Futures Framework)"
        format: "Structured parameters"
        source: "C2 / IPCC / IPBES"
      - name: "Qualitative and quantitative baseline management and decision-making data"
        format: "Mixed"
        source: "RA B (B1-B3)"
    outputs:
      - name: "Land-use scenarios: management activities, upscaling of ES impacts at European scale"
        format: "GeoTIFF / structured parameters"
        consumers: ["iLAND"]
      - name: "Governance experiment parameters for adaptive management"
        format: "Structured parameters"
        consumers: ["C4"]
      - name: "Transformation and Adaptation Pathways (A&TPs) under behavioural, socioeconomic, political and climatic change"
        format: "Report / CSV"
        consumers: ["C4", "Stritih", "Hanewinkel"]
    hire:
      name: "TBD — options available in CRAFTY modelling team"
      start: "end 2026 (pending)"
    notes: "Scale mismatch open challenge: CRAFTY-EU 1 km vs iLAND 100 m. Collaborative role linking RA A, B, C1, C3 models, and C4 governance."

  # ── LAYER 0: CONCEPTUAL FRAMEWORK (C1) ───────────────────

  - id: c1_framework
    layer: 0
    pi: "Prof. Dr. Stefan Pauliuk"
    pi_collaborators: ["Prof. Dr. Tanja Mölders", "Prof. Dr. Maja Schlüter", "Prof. Dr. Sylvia Kruse", "Prof. Dr. Stefan Baumgärtner", "Prof. Dr. Michael Pregernig"]
    model_name: "C1 — SES Conceptual Framework"
    short_description: "This module develops a common social-ecological systems vocabulary, indicator set, and accounting framework for the cluster. It will identify and formalise the descriptions of new interactions and new emerging properties in future forest SESs across different scales in space and time, e.g., the formation of new societal actors (businesses, lobby groups, institutions) and their relation to forests."
    modelling_approach: "Conceptual / Theoretical SES framework (not a computational model)"
    type: "Interdisciplinary SES theory and conceptualisation"
    language: []
    status: "in_development"
    scale: "Cluster-wide conceptual foundation"
    inputs:
      - name: "Existing SES frameworks and their limitations for forest systems"
        format: "Academic literature"
        source: "Scientific literature (e.g. Binder et al. 2013; Vigna et al. 2021; Houballah et al. 2020)"
        note: "There are numerous SES frameworks, but very few are explicitly designed to address forests. The widely applied IAD framework (Ostrom) provides a useful SES indicator dashboard but focuses on institutional variables and neglects ecological ones, making it insufficient for future forest SESs. Approaches from Political Ecology strengthen the critical perspective on human-forest relations but lack a fine-grained repertoire of ecological categories. C1 builds on and goes beyond these frameworks."
      - name: "Interdisciplinary knowledge from RA A (biophysical) and RA B (social science)"
        format: "Mixed — data, concepts, empirical findings"
        source: "All Future Forests research areas"
    outputs:
      - name: "Shared SES definitions, indicators, and terminology for the cluster"
        format: "Documentation / conceptual models"
        consumers: ["All groups"]
      - name: "Accounting frameworks and system boundary definitions"
        format: "Documentation"
        consumers: ["Pauliuk", "Brown"]
      - name: "Interdisciplinary co-learning process outputs"
        format: "Workshops / documentation"
        consumers: ["All groups"]
    hire:
      name: "TBD"
      start: "TBD"
    notes: "C1 is not a modelling group in the computational sense but the theoretical infrastructure. Lead: Pauliuk, Mölders. Contributors: Baumgärtner, May, Zengerling, Pregernig, Dormann, Schlüter, Kruse."

  - id: c2_scenarios
    layer: 0
    pi: "Prof. Dr. Marc Hanewinkel / Prof. Dr. Kerstin Stahl"
    pi_collaborators: ["Dr. Calum Brown", "Prof. Dr. Andreas Christen", "Prof. Dr. Stefan Pauliuk", "Prof. Dr. René Orth", "Prof. Dr. Dirk Schindler", "Prof. Dr. Markus Weiler"]
    model_name: "C2 — Transdisciplinary Regionalised Scenarios for Novel SESs"
    short_description: "This module produces the scenario infrastructure that all C3 models run on. It translates global frameworks (SSPs, RCPs, Nature's Futures Framework) into high-resolution, locally relevant inputs for the FuFo study regions. On the climate side, the focus is on downscaled projections with explicit treatment of extreme events and compound droughts. On the socio-economic side, narratives and quantitative pathways are co-created with stakeholders and partner institutions. The resulting products feed all C3 modelling groups and inform governance experimentation in C4."
    modelling_approach: "Scenario development / Statistical downscaling / Stakeholder co-design"
    type: "Scenario framework (C2) — feeds all C3 and C4 work"
    language: []
    status: "in_development"
    scale: "Regional — FuFo study regions (SW Germany) to national scale; global scenario frameworks as backbone"
    inputs:
      - name: "Global climate model outputs (CMIP6, CORDEX regional climate downscaling)"
        format: "NetCDF"
        source: "ESGF / Copernicus (open access)"
      - name: "Observational hydrological and meteorological records"
        format: "CSV / NetCDF"
        source: "German water authorities / DWD / GRDC"
      - name: "National timber supply and land use scenarios (WEHAM)"
        format: "CSV / reports"
        source: "Thünen Institute"
      - name: "Stakeholder input from SES-CaseLab and partner institutions (ForstBW, FVA)"
        format: "Qualitative / structured parameters"
        source: "SES-CaseLab / ForstBW / FVA"
      - name: "RA A biophysical findings to constrain scenario plausibility"
        format: "Mixed"
        source: "RA A research themes"
    outputs:
      - name: "Downscaled hydro-climatic projections at 100 m resolution (historical and future warming levels)"
        format: "NetCDF / CSV"
        consumers: ["iLAND", "RoGeR", "Brown", "Hanewinkel"]
      - name: "Extreme event storylines and stress-test scenarios (e.g. recurrence of 2018–2022 drought in 2050)"
        format: "NetCDF / structured scenario parameters"
        consumers: ["iLAND", "RoGeR", "Brown", "Stritih"]
      - name: "Socio-economic scenarios: land use, timber demand, governance narratives (SSP/NFF-consistent)"
        format: "Structured parameters / reports"
        consumers: ["Brown", "Hanewinkel", "Stritih", "Pauliuk"]
      - name: "Co-created regional storylines for forest SESs — stakeholder-verified and regionally specific"
        format: "Reports / structured parameters"
        consumers: ["All C3 groups", "C4"]
    hire:
      name: "Dr. Christopher Jung (PostDoc)"
      start: "TBD"
    notes: "C2 co-leads: Hanewinkel (socio-economic scenarios) and Stahl (hydro-climatic scenarios and extreme events). C2 is not a standalone C3 modelling group but the scenario infrastructure that feeds all of C3 and C4. HyClimScenarios (Jung/Schindler) is the primary C2 computational output in C3."
