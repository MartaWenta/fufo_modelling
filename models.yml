  cluster: forest_ecology
- id: orth
  layer: 1
  pi: Prof. Dr. René Orth
  pi_collaborators:
  - Prof. Dr. Teja Kattenborn
  - Dr. Pia Müller
  model_name: Forest Drought Response Functions
  short_description: 'This group quantifies how forest function declines as water availability decreases, using global satellite observations, eddy covariance flux tower data, and plant traits from the
    TRY database. The resulting species-specific response functions — relating photosynthesis and transpiration to soil water content and vapour pressure deficit — are embedded into iLAND to constrain its
    drought mortality representation. Reference: Lusk et al. 2025 (bioRxiv).'
  type: Machine learning / Data synthesis / Observational
  modelling_approach: Machine learning / Data synthesis
  language:
  - Python
  - R
  status: operational
  scale: Global training data applied regionally in FuFo domain
  inputs:
  - name: Global plant trait maps
    source: Open databases
  - name: Satellite vegetation datasets — soil moisture, vapour pressure deficit
  outputs:
  - name: Species-specific drought response functions (vegetation function vs. soil moisture / VPD)
  hire:
    name: TBD
    start: TBD
  area_of_application: Climate impact research
  topic: Drought modelling
  methods: Modelling
  cluster: climate_hydrology
- id: iland
  layer: 2
  pi: Prof. Dr. Thomas Seifert
  pi_collaborators:
  - Dr. Axel Albrecht
  - Prof. Dr. Marc Hanewinkel
  - Prof. Dr. Markus Weiler
  - Jun.-Prof. Dr. Ana Stritih
  model_name: iLAND — Individual-based Forest Landscape and Disturbance Model
  short_description: iLAND simulates growth, mortality, regeneration, and disturbance for every individual tree in a landscape at 100 m × 100 m resolution, from plot scale up to catchments of around 10
    000 ha. Ecophysiological processes — carbon allocation, light competition, drought stress, wind, bark beetle, and fire — are represented explicitly. Silvicultural management is handled through the Agent-Based
    Engine (ABE) module, which links directly to participatory scenario work. iLAND is bidirectionally coupled with RoGeR.
  type: Process-based / Individual-based forest landscape model
  modelling_approach: Process-based / Individual-based model
  language:
  - C++
  - R
  - JavaScript (iLAND interface)
  status: operational
  scale: Individual tree to ~10 000 ha; 100 m x 100 m resolution
  inputs:
  - name: Topography, soil data, climate data (temperature, precipitation, etc.)
    source: Weiler (GIS), Jung/Schindler, Christen
  - name: Spatial data on trees or inventory data (ULS, 3D trees, digital twins)
    source: Seifert
  - name: Management scenarios
    source: Stritih
  outputs:
  - name: 'Individual tree to small catchment (10 000 ha): biomass, structure, species composition, carbon, harvested volume'
  - name: Ecosystem service indicators
  hire:
    name: TBD
    start: TBD
  notes: 'Bidirectionally coupled with RoGeR. iLAND -> RoGeR: canopy, LAI, root uptake. RoGeR -> iLAND: soil water content (SWC), lateral flow. ABE module = direct interface to Stritih participatory ABM.'
  area_of_application: Forest sciences, forestry
  topic: Forest growth and management
  methods: Modelling
  cluster: forest_ecology
- id: roger
  layer: 2
  pi: Prof. Dr. Markus Weiler
  model_name: RoGeR — Runoff Generation Research Model (modular toolkit)
  short_description: RoGeR models water redistribution at the surface and subsurface across three topographic settings — plateau (vertical flow only), hillslope (lateral subsurface inflow and outflow),
    and riparian zones (groundwater and capillary rise). All parameters are physically measurable; no calibration is required. The model operates from 1 m to several thousand km² and timesteps from one
    minute to one day. Within FuFo, it is being extended with a groundwater component through coupling to MODFLOW (Stahl) and has previously been coupled to bark beetle infestation risk at 10 m resolution
    (Weiler and Puhlmann).
  type: Process-based hydrological model
  modelling_approach: Process-based hydrological model (no parameter calibration)
  language:
  - Python
  - Fortran
  status: operational
  scale: 1 m to several 1000 km²; timestep 1 min to 1 day
  inputs:
  - name: Local climate scenarios and meteorological forcing
    source: Jung/Schindler (HyClimScenarios) / Stahl
  - name: Soil properties, geology
    source: Weiler (GIS)
  - name: Tree species, age, rooting depth
    source: Seifert / Weiler (GIS)
  outputs:
  - name: Soil water availability in root zone across plateau, hillslope, and riparian settings
  hire:
    name: TBD
    start: TBD
  notes: 'Bidirectionally coupled with iLAND: iLAND → RoGeR (canopy, LAI, root uptake); RoGeR → iLAND (soil water content, lateral flow). Key feature: no parameter calibration — all parameters measurable.
    Modular: RoGeR, RoGeR_WB, RoGeR_WB_Urban, RoGeR_dyn, RoGeR_WB_Dyn.'
  area_of_application: Forestry, hydrology, ecosystem services
  topic: Hydrology, general hydro-modelling
  methods: GIS analysis, hydrological modelling
  cluster: forest_ecology
- id: stritih
  layer: 3
  pi: Jun.-Prof. Dr. Ana Stritih
  model_name: Participatory Modelling — iLAND + ABE
  short_description: Brings forest managers, ecologists, and other stakeholders together to co-design realistic management scenarios for future forests. These scenarios are then fed into iLAND's Agent-Based Engine (ABE), which simulates how different management choices play out over time. The scenarios Stritih produces are not only used by iLAND — they also travel downstream as inputs to Brown's European land use model (CRAFTY-EU) and Pauliuk's wood cascade analysis, making her group a central connector between the participatory process and the quantitative modelling chain. Credibility and legitimacy of scenarios are evaluated alongside the modelling results.
  type: Participatory modelling / Agent-based modelling / Spatial analysis
  modelling_approach: Participatory modelling / Agent-based model
  language:
  - R
  - Python
  - JavaScript (iLAND ABE)
  status: in_development
  scale: 'Landscape scale — potential areas: Schwarzwald, Oberrhein (TBD with SES-CaseLab)'
  inputs:
  - name: Daily climate data (temperature, precipitation, vapour pressure deficit, radiation)
    source: Jung/Schindler, Christen
  - name: Spatial data (soil, elevation)
    source: Weiler (GIS)
  - name: Forest structure and vegetation data
    source: Seifert
  - name: Stakeholder input from local forest managers
    source: SES-CaseLab
  outputs:
  - name: Co-designed management scenarios — silvicultural strategies and management intensity choices
    consumers:
    - iLAND (ABE module)
    - Brown (CRAFTY-EU)
    - Pauliuk (Wood Cascade)
  - name: Credibility and legitimacy assessments of management scenarios
  - name: Landscape-scale ecosystem service outcomes under different management strategies
  hire:
    name: Christina Dollinger (PostDoc, Margarete-von-Wrangell funding, currently TUM)
    start: '2026-05-01'
  notes: 'Participatory process: Agents (forest managers) Observe → Plan → Act cycle. Scenario outputs feed iLAND (ABE module), Brown (CRAFTY-EU), and Pauliuk (Wood Cascade). Scenario assumptions derive from stakeholder co-creation grounded in SSP/NFF frameworks.'
  area_of_application: Forest sciences, forestry
  topic: Forest growth and management
  methods: Modelling
  cluster: forest_ecology
- id: hanewinkel
  layer: 3
  pi: Prof. Dr. Marc Hanewinkel
  pi_collaborators:
  - Prof. Dr. Stefan Pauliuk
  model_name: Forest Economics and Risk Model (GFPM-SW)
  short_description: Develops an economic modelling and evaluation framework for ecosystem services under risk and uncertainty, applied to the outputs of the process-based growth models. The framework adapts
    the Global Forest Products Model (GFPM, Buongiorno et al.) for Southwest Germany as a partial equilibrium model implemented in GAMS. It takes ecosystem service outputs from iLAND and RoGeR, models their
    flow through demand, supply, industry, and networks of markets, and produces optimised robust management strategies using Value at Risk and Conditional Value at Risk metrics. Connected to the wood cascade
    model of Pauliuk to link into the industry sphere. Contributes preliminary Adaptation and Transformation Pathways for forests in SW Germany, including economic boundaries and robust management strategies.
  type: Partial equilibrium model / Economic optimisation
  modelling_approach: Partial equilibrium / Economic optimisation
  language:
  - R
  - Python
  - GAMS
  status: planned
  scale: Larger regions SW Germany to national scale
  inputs:
  - name: Ecosystem service outputs from process-based forest growth simulations
    source: iLAND, RoGeR
  - name: Forest vulnerability and mortality risk maps at landscape scale
    source: A3 — Kattenborn, Albrecht (remote sensing and mortality modelling)
  - name: Socio-economic scenarios — prices, costs, technology development pathways
    source: C2 scenarios
  outputs:
  - name: Optimised robust management strategies — demand, supply, industry, network of markets
  - name: Economic boundaries for Adaptation and Transformation Pathways
  hire:
    name: TBD (deadline extended)
    start: TBD
  notes: 'Hiring pending — deadline extended. Model: GFPM in GAMS. Risk metrics: VaR/CVaR.'
  area_of_application: Forestry economics
  topic: Economic modelling
  methods: Modelling
  cluster: socio_economic
- id: pauliuk
  layer: 3
  pi: Prof. Dr. Stefan Pauliuk
  pi_collaborators:
  - Dr. Simon Schulte
  - Prof. Dr. Heiner Schanz
  - Jun.-Prof. Dr. Ana Stritih
  - Prof. Dr. Marc Hanewinkel
  - Prof. Dr. Maja Schlüter
  model_name: Wood Cascade and Carbon Accounting (A&TPs)
  short_description: 'Develops a modelling and stakeholder engagement framework for identifying and evaluating Adaptation and Transformation Pathways for wood use and cascading. An A&TP is defined here
    as a sequence of decisions by agents in the wood use system — together with the resulting trajectory of system variables — that meets given objectives and respects given principles of responsibility
    and legitimacy. The work proceeds in three steps: (1) mapping the option space through scenarios for wood supply and demand; (2) combining wood processing data, stakeholder input on development goals,
    and model-based decision sequences to identify candidate pathways; (3) assessing the achievability of different goals under uncertainty and evaluating pathways for synergies, trade-offs, and robustness.
    A co-creation process with RA B and the SES-CaseLab is required for steps 2 and 3.'
  type: Material flow analysis (MFA) / Life cycle assessment (LCA) / Socio-technical systems modelling
  modelling_approach: Material flow analysis / Life cycle assessment
  language:
  - Python
  status: in_development
  scale: Stand-level to entire wood supply potential; 100 to 200 year horizon
  inputs:
  - name: 'Wood cascade data: stocks, flows, carbon, monetary values'
    source: iLAND / Hanewinkel
  - name: Stakeholder input on development goals
    source: SES-CaseLab / RA B
  outputs:
  - name: 'Wood cascade scenarios: stocks, flows, carbon balance, monetary evaluation'
  - name: Adaptation and Transformation Pathways for wood use
  hire:
    name: Dr. Simon Schulte
    start: TBD
  notes: Co-creation process needed — input from RA B and SES-CaseLab required. A&TP = sequence of decisions by agents plus resulting trajectory of system variables.
  area_of_application: Socioeconomics
  topic: Wood cascade and carbon
  methods: Modelling
  cluster: socio_economic
- id: schanz
  layer: 3
  pi: Prof. Dr. Heiner Schanz
  model_name: FESMarkets — Forest Ecosystem Service Markets
  short_description: 'Analyses the structural architecture of Forest Ecosystem Service networks — covering water, recreation, protection, and timber — with a focus on how actual supply and demand for these
    services occurs through real markets (commodities, contracts) and political markets (subsidies), linked across complex value chain networks. The goal is twofold: to characterise the architecture of
    these networks, and to explore their governance dynamics as a basis for regulatory simulations and system dynamics modelling. A system dynamics model captures stocks and flows at the macro level; Causal
    Loop Diagrams represent actor perspectives and governance interventions at the micro level.'
  type: System dynamics / Network of Markets (NoM) / Causal Loop Diagrams (CLD)
  modelling_approach: System dynamics / Network of Markets
  language:
  - Python
  - Vensim
  status: planned
  scale: Forestry industries — Germany and comparative European contexts
  inputs:
  - name: 'Forest ecosystem service indicators: timber, water, recreation, protection'
    source: iLAND, RoGeR
  - name: 'Market data: prices, volumes, subsidies'
    source: Eurostat / national statistics
  outputs:
  - name: System dynamics model — stocks and flows as function of forest condition/quality
  - name: Causal Loop Diagrams for relevant markets and governance interventions
  hire:
    name: Steffi Peuckert (PhD)
    start: '2026-04-01'
  notes: Strong synergy with Yannek (group affiliation TBC) on system dynamics — collaboration planned once PhD begins.
  area_of_application: Forest bioeconomy
  topic: Forest Markets Modelling
  methods: Modelling
  cluster: socio_economic
- id: brown
  layer: 3
  pi: Dr. Calum Brown
  pi_collaborators:
