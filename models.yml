  # ── LAYER 0: CONCEPTUAL FRAMEWORK (C1) ───────────────────

  - id: c1_framework
    layer: 0
    pi: "Prof. Dr. Stefan Pauliuk"
    pi_collaborators: ["Prof. Dr. Tanja Mölders", "Prof. Dr. Maja Schlüter", "Prof. Dr. Sylvia Kruse", "Prof. Dr. Stefan Baumgärtner", "Prof. Dr. Michael Pregernig"]
    model_name: "C1 — SES Conceptual Framework"
    short_description: "The theoretical and conceptual backbone of the entire Future Forests cluster. C1 develops a shared interdisciplinary social-ecological systems (SES) framework — including consistent definitions, indicators, accounting frameworks, and system boundaries — that all other research areas build on. It bridges natural science and social science vocabularies so that biophysical models and social models can be meaningfully connected. C1's framework provides the conceptual foundation for building comprehensive models and investigating Adaptation and Transformation Pathways (A&TPs) for novel forest SESs, as well as preparing, applying, and scaling governance innovations in C4, to provide a comprehensive and consistent depiction of future forests as novel SESs and their governance and management."
    key_question: "What is a future forest as a social-ecological system — how do we define it, measure it, and talk about it across disciplines?"
    modelling_approach: "Conceptual / Theoretical SES framework (not a computational model)"
    type: "Interdisciplinary SES theory and conceptualisation"
    language: []
    status: "in_development"
    scale: "Cluster-wide conceptual foundation"
    inputs:
      - name: "Existing SES frameworks and their limitations for forest systems"
        format: "Academic literature"
        source: "Scientific literature (e.g. Binder et al. 2013; Vigna et al. 2021; Houballah et al. 2020)"
        note: "There are numerous SES frameworks, but very few are explicitly designed to address forests. The widely applied IAD framework (Ostrom) provides a useful SES indicator dashboard but focuses on institutional variables and neglects ecological ones, making it insufficient for future forest SESs. Approaches from Political Ecology strengthen the critical perspective on human-forest relations but lack a fine-grained repertoire of ecological categories. C1 builds on and goes beyond these frameworks."
      - name: "Interdisciplinary knowledge from RA A (biophysical) and RA B (social science)"
        format: "Mixed — data, concepts, empirical findings"
        source: "All Future Forests research areas"
    outputs:
      - name: "Shared SES definitions, indicators, and terminology for the cluster"
        format: "Documentation / conceptual models"
        consumers: ["All groups"]
      - name: "Accounting frameworks and system boundary definitions"
        format: "Documentation"
        consumers: ["Pauliuk", "Brown"]
      - name: "Interdisciplinary co-learning process outputs"
        format: "Workshops / documentation"
        consumers: ["All groups"]
    hire:
      name: "TBD"
      start: "TBD"
    notes: "C1 is not a modelling group in the computational sense but the theoretical infrastructure. Lead: Pauliuk, Mölders. Contributors: Baumgärtner, May, Zengerling, Pregernig, Dormann, Schlüter, Kruse."

  - id: c2_scenarios
    layer: 0
    pi: "Prof. Dr. Marc Hanewinkel / Prof. Dr. Kerstin Stahl"
    pi_collaborators: ["Dr. Calum Brown", "Prof. Dr. Andreas Christen", "Prof. Dr. Stefan Pauliuk", "Prof. Dr. René Orth", "Prof. Dr. Dirk Schindler", "Prof. Dr. Markus Weiler"]
    model_name: "C2 — Transdisciplinary Regionalised Scenarios for Novel SESs"
    short_description: "C2 develops consistent and stakeholder-verified scenarios depicting the different future hydro-climatic and socio-economic conditions under which future forests will develop. These scenarios are a crucial input to modelling Adaptation and Transformation Pathways (A&TPs) in C3 and governance experimentation in C4. The consortium builds on multi-disciplinary expertise with studies using climate scenarios and regionally tailored downscaled climate projections (CMIP, CORDEX), bias corrections and weather generators for a range of applications including forest growth and economics. On the biophysical side, downscaled climate models focus on ensembles with relevant extreme events and disturbance triggers such as droughts, combining long-term climate model changes with event-storyline formulations. On the socio-economic side, C2 works with partners and stakeholders to co-create quantitative scenarios for the adaptation and transformation of socio-metabolic systems, drawing on existing national scenarios for timber supply. The scenarios developed in C2 specify local conditions in established global frameworks (SSPs, RCPs, Nature's Futures Framework) for the FuFo study regions."
    key_question: "What hydro-climatic and socio-economic conditions and extreme events will future forest social-ecological systems in our study region face — and what scenarios should guide planning and management?"
    modelling_approach: "Scenario development / Statistical downscaling / Stakeholder co-design"
    type: "Scenario framework (C2) — feeds all C3 and C4 work"
    language: []
    status: "in_development"
    scale: "Regional — FuFo study regions (SW Germany) to national scale; global scenario frameworks as backbone"
    inputs:
      - name: "Global climate model outputs (CMIP6, CORDEX regional climate downscaling)"
        format: "NetCDF"
        source: "ESGF / Copernicus (open access)"
      - name: "Observational hydrological and meteorological records"
        format: "CSV / NetCDF"
        source: "German water authorities / DWD / GRDC"
      - name: "National timber supply and land use scenarios (WEHAM)"
        format: "CSV / reports"
        source: "Thünen Institute"
      - name: "Stakeholder input from SES-CaseLab and partner institutions (ForstBW, FVA)"
        format: "Qualitative / structured parameters"
        source: "SES-CaseLab / ForstBW / FVA"
      - name: "RA A biophysical findings to constrain scenario plausibility"
        format: "Mixed"
        source: "RA A research themes"
    outputs:
      - name: "Downscaled hydro-climatic projections at 100 m resolution (historical and future warming levels)"
        format: "NetCDF / CSV"
        consumers: ["iLAND", "RoGeR", "Brown", "Hanewinkel"]
      - name: "Extreme event storylines and stress-test scenarios (e.g. recurrence of 2018–2022 drought in 2050)"
        format: "NetCDF / structured scenario parameters"
        consumers: ["iLAND", "RoGeR", "Brown", "Stritih"]
      - name: "Socio-economic scenarios: land use, timber demand, governance narratives (SSP/NFF-consistent)"
        format: "Structured parameters / reports"
        consumers: ["Brown", "Hanewinkel", "Stritih", "Pauliuk"]
      - name: "Co-created regional storylines for forest SESs — stakeholder-verified and regionally specific"
        format: "Reports / structured parameters"
        consumers: ["All C3 groups", "C4"]
    hire:
      name: "Dr. Christopher Jung (PostDoc)"
      start: "TBD"
    notes: "C2 co-leads: Hanewinkel (socio-economic scenarios) and Stahl (hydro-climatic scenarios and extreme events). C2 is not a standalone C3 modelling group but the scenario infrastructure that feeds all of C3 and C4. HyClimScenarios (Jung/Schindler) is the primary C2 computational output in C3."

  # ── CROSS-CUTTING: METHODOLOGY & UNCERTAINTY ─────────────

  - id: dormann
    layer: 99
    cross_cutting: true
    pi: "Prof. Dr. Carsten Dormann"
    model_name: "Model-Data Integration & Uncertainty Quantification"
    short_description: "Cross-cutting methodological role spanning C1 and C3. Dormann provides rigorous statistical methods for integrating observational data with models, quantifying and propagating uncertainty through the modelling chain, and developing species distribution and biodiversity models. His work ensures that the outputs of C3 models are scientifically defensible — that we know not just what the models predict, but how confident we should be. In C3, he contributes to calibration, validation, and uncertainty analysis across the model framework."
    key_question: "How uncertain are our model predictions, which uncertainties matter most, and how do we make models and data work together rigorously?"
    modelling_approach: "Statistical modelling / Bayesian inference / Uncertainty quantification"
    type: "Cross-cutting methodology (C1 + C3)"
    language: ["R", "Python"]
    status: "in_development"
    scale: "Cross-cutting — applies to all C3 model outputs"
    inputs:
      - name: "Model outputs from all C3 groups (for uncertainty analysis)"
        format: "CSV / NetCDF"
        source: "All C3 groups"
      - name: "Observational data for model-data integration"
        format: "CSV / databases"
        source: "RA A field campaigns, remote sensing"
      - name: "Evidence base for ecosystem services (for B1)"
        format: "Literature / data"
        source: "Scientific literature / field data"
    outputs:
      - name: "Uncertainty envelopes and sensitivity analyses for C3 model chain"
        format: "R/Python functions / reports"
        consumers: ["iLAND", "RoGeR", "Orth", "Stritih", "Hanewinkel"]
      - name: "Statistical species distribution and biodiversity models"
        format: "R functions / GeoTIFF"
        consumers: ["iLAND", "Kattenborn", "Brown"]
      - name: "Model calibration and validation frameworks"
        format: "R/Python code / documentation"
        consumers: ["All C3 groups"]
      - name: "Evidence syntheses for decision support (B1)"
        format: "Reports"
        consumers: ["C1 Framework", "C4"]
    hire:
      name: "TBD"
      start: "TBD"
    notes: "Listed as C1 and C3 contributor in proposal. Also leads B1 (Evidentiary bases of decision-making) with Pregernig. Previous FRIAS focus theme on Environmental Modelling with Baumgärtner and Stahl. Cross-cutting role: not a standalone model but methodological infrastructure supporting all C3 groups on calibration, validation, and uncertainty."
